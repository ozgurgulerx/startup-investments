name: Daily Startup News Digest

on:
  workflow_dispatch:
    inputs:
      edition_date:
        description: "Edition date (YYYY-MM-DD); defaults to latest ready edition"
        required: false
        default: ""
  schedule:
    - cron: '10 13 * * *'

permissions:
  contents: read

jobs:
  send-digest:
    runs-on: ubuntu-latest
    concurrency:
      group: news-digest-daily
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          for key in DATABASE_URL RESEND_API_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              exit 1
            fi
          done

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install analysis dependencies
        working-directory: packages/analysis
        run: |
          pip install -r requirements.txt

      - name: Apply news migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python3 << 'PY'
          import asyncio
          import os
          from pathlib import Path
          import asyncpg

          db_url = os.environ["DATABASE_URL"]
          migrations = [
              Path("database/migrations/012_daily_news.sql"),
              Path("database/migrations/013_news_digest_and_llm_enrichment.sql"),
              Path("database/migrations/014_news_llm_scoring_and_classification.sql"),
          ]

          async def run():
              conn = await asyncpg.connect(db_url)
              try:
                  for migration in migrations:
                      sql = migration.read_text(encoding="utf-8")
                      await conn.execute(sql)
                      print(f"Applied migration: {migration}")
              finally:
                  await conn.close()

          asyncio.run(run())
          PY

      - name: Send daily digest emails
        working-directory: packages/analysis
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWS_DIGEST_REPLY_TO: ${{ secrets.NEWS_DIGEST_REPLY_TO }}
          NEWS_DIGEST_FROM_EMAIL: ${{ secrets.NEWS_DIGEST_FROM_EMAIL }}
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
        run: |
          EDITION_DATE="${{ github.event.inputs.edition_date || '' }}"
          CMD=(python main.py send-news-digest)
          if [ -n "$EDITION_DATE" ]; then
            CMD+=(--edition-date "$EDITION_DATE")
          fi
          "${CMD[@]}"

      - name: Notify Slack (failure)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "News digest failed"
          SLACK_STATUS: "failure"
          SLACK_BODY: |
            *Workflow:* `${{ github.workflow }}`
            *Job:* `send-digest`
            *Ref:* `${{ github.ref_name }}`
            *SHA:* `${{ github.sha }}`
          SLACK_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 scripts/slack_notify.py
