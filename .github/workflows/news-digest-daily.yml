name: Daily Startup News Digest

on:
  workflow_dispatch:
    inputs:
      edition_date:
        description: "Edition date (YYYY-MM-DD); defaults to latest ready edition"
        required: false
        default: ""
      region:
        description: "Region to send digest for (global, turkey, or all)"
        required: false
        default: "all"
      dry_run:
        description: "If true, do not send emails (safe test run)"
        required: false
        default: "false"
  schedule:
    - cron: '10 13 * * *'

permissions:
  contents: read

jobs:
  send-digest:
    runs-on: ubuntu-latest
    concurrency:
      group: news-digest-daily
      cancel-in-progress: false

    strategy:
      matrix:
        region: [global, turkey]

    steps:
      - uses: actions/checkout@v4

      - name: Skip if manual dispatch for single region
        id: should-run
        run: |
          INPUT_REGION="${{ github.event.inputs.region || 'all' }}"
          MATRIX_REGION="${{ matrix.region }}"
          if [ "$INPUT_REGION" != "all" ] && [ "$INPUT_REGION" != "$MATRIX_REGION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate required secrets
        if: steps.should-run.outputs.skip != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          for key in DATABASE_URL RESEND_API_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              exit 1
            fi
          done

      - name: Setup Python
        if: steps.should-run.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install analysis dependencies
        if: steps.should-run.outputs.skip != 'true'
        working-directory: packages/analysis
        run: |
          pip install -r requirements.txt

      - name: Apply news migrations
        if: steps.should-run.outputs.skip != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python3 << 'PY'
          import asyncio
          import os
          from pathlib import Path
          import asyncpg

          db_url = os.environ["DATABASE_URL"]
          migrations = [
              Path("database/migrations/012_daily_news.sql"),
              Path("database/migrations/013_news_digest_and_llm_enrichment.sql"),
              Path("database/migrations/014_news_llm_scoring_and_classification.sql"),
              Path("database/migrations/020_news_editions_by_region.sql"),
              Path("database/migrations/017_email_confirmation_and_region.sql"),
              Path("database/migrations/018_news_subscription_rate_limits.sql"),
          ]

          async def run():
              conn = await asyncpg.connect(db_url)
              try:
                  for migration in migrations:
                      if migration.exists():
                          sql = migration.read_text(encoding="utf-8")
                          await conn.execute(sql)
                          print(f"Applied migration: {migration}")
                      else:
                          print(f"Migration not found, skipping: {migration}")
              finally:
                  await conn.close()

          asyncio.run(run())
          PY

      - name: Send daily digest emails (${{ matrix.region }})
        if: steps.should-run.outputs.skip != 'true'
        working-directory: packages/analysis
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWS_DIGEST_REPLY_TO: ${{ secrets.NEWS_DIGEST_REPLY_TO }}
          NEWS_DIGEST_FROM_EMAIL: ${{ secrets.NEWS_DIGEST_FROM_EMAIL }}
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
          NEWS_DIGEST_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          EDITION_DATE="${{ github.event.inputs.edition_date || '' }}"
          CMD=(python main.py send-news-digest --region "${{ matrix.region }}")
          if [ -n "$EDITION_DATE" ]; then
            CMD+=(--edition-date "$EDITION_DATE")
          fi
          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then
            CMD+=(--dry-run)
          fi
          "${CMD[@]}"

      - name: Notify Slack (failure)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "News digest failed (${{ matrix.region }})"
          SLACK_STATUS: "failure"
          SLACK_BODY: |
            *Workflow:* `${{ github.workflow }}`
            *Job:* `send-digest (${{ matrix.region }})`
            *Ref:* `${{ github.ref_name }}`
            *SHA:* `${{ github.sha }}`
          SLACK_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 scripts/slack_notify.py
