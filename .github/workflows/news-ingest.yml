name: Daily Startup News Ingest

on:
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: "Lookback window for source collection"
        required: false
        default: "48"
      edition_date:
        description: "Edition date (YYYY-MM-DD); defaults to today UTC"
        required: false
        default: ""
      rebuild_only:
        description: "Rebuild clusters/edition without fetching new sources"
        required: false
        default: "false"
  # NOTE: Scheduled runs moved to VM cron (infrastructure/vm-cron/jobs/news-ingest.sh).
  # schedule:
  #   - cron: '15 * * * *'

permissions:
  contents: read

jobs:
  ingest-news:
    runs-on: ubuntu-latest
    concurrency:
      group: news-ingest
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Missing required secret: DATABASE_URL"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install analysis dependencies
        working-directory: packages/analysis
        run: |
          pip install -r requirements.txt

      - name: Apply crawler and news migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python3 << 'PY'
          import asyncio
          import os
          from pathlib import Path
          import asyncpg

          db_url = os.environ["DATABASE_URL"]
          migrations = [
              Path("database/migrations/011_frontier_and_incremental_recrawl.sql"),
              Path("database/migrations/012_daily_news.sql"),
              Path("database/migrations/013_news_digest_and_llm_enrichment.sql"),
              Path("database/migrations/014_news_llm_scoring_and_classification.sql"),
              Path("database/migrations/020_news_editions_by_region.sql"),
              Path("database/migrations/030_news_clusters_by_region.sql"),
              Path("database/migrations/023_memory_system.sql"),
              Path("database/migrations/024_regional_memory.sql"),
              Path("database/migrations/025_periodic_briefs.sql"),
              Path("database/migrations/026_refinery_enhancements.sql"),
              Path("database/migrations/028_pgvector_embeddings.sql"),
              Path("database/migrations/027_subscriber_timezone.sql"),
              Path("database/migrations/017_email_confirmation_and_region.sql"),
              Path("database/migrations/018_news_subscription_rate_limits.sql"),
              Path("database/migrations/032_topic_research.sql"),
              Path("database/migrations/036_signal_intelligence_schema.sql"),
              Path("database/migrations/038_fix_signal_dedupe.sql"),
              Path("database/migrations/042_event_key_discriminator.sql"),
              Path("database/migrations/043_startup_refresh_jobs.sql"),
              Path("database/migrations/043_effective_date.sql"),
              Path("database/migrations/046_startup_merge_infrastructure.sql"),
              Path("database/migrations/047_editorial_scoring_method.sql"),
          ]

          async def run():
              conn = await asyncpg.connect(db_url)
              try:
                  for migration in migrations:
                      if not migration.exists():
                          raise SystemExit(f"Migration file not found: {migration}")
                      sql = migration.read_text(encoding="utf-8")
                      await conn.execute(sql)
                      print(f"Applied migration: {migration}")
              finally:
                  await conn.close()

          asyncio.run(run())
          PY

      - name: Ingest and rank daily startup news
        working-directory: packages/analysis
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWS_LLM_ENRICHMENT: "true"
          NEWS_LLM_MAX_CLUSTERS: "24"
          NEWS_LLM_CONCURRENCY: "4"
          NEWS_LLM_MODEL: "gpt-4o-mini"
          INTEL_FIRST_PROMPT: "true"
        run: |
          LOOKBACK="${{ github.event.inputs.lookback_hours || '48' }}"
          EDITION_DATE="${{ github.event.inputs.edition_date || '' }}"
          REBUILD_ONLY="${{ github.event.inputs.rebuild_only || 'false' }}"

          CMD=(python main.py ingest-news --lookback-hours "$LOOKBACK")
          if [ -n "$EDITION_DATE" ]; then
            CMD+=(--edition-date "$EDITION_DATE")
          fi
          if [ "$REBUILD_ONLY" = "true" ]; then
            CMD+=(--rebuild-only)
          fi

          "${CMD[@]}"

      - name: Notify Slack (failure)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "News ingest failed"
          SLACK_STATUS: "failure"
          SLACK_BODY: |
            *Workflow:* `${{ github.workflow }}`
            *Job:* `ingest-news`
            *Ref:* `${{ github.ref_name }}`
            *SHA:* `${{ github.sha }}`
          SLACK_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 scripts/slack_notify.py
