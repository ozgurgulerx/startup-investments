name: Sync Blob Storage Data and Deploy

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      period:
        description: 'Specific period to sync (YYYY-MM), leave empty for all latest'
        required: false
        type: string
      force_deploy:
        description: 'Force deploy even if no changes'
        required: false
        type: boolean
        default: false

  # Can be triggered from Azure Functions via repository_dispatch
  repository_dispatch:
    types: [sync-data, data-updated]

  # NOTE: Scheduled runs moved to VM cron (infrastructure/vm-cron/jobs/sync-data.sh).
  # schedule:
  #   - cron: '0,30 8-20 * * 1-5'  # Mon-Fri, 8am-8pm UTC, every 30 min

permissions:
  id-token: write
  contents: write
  actions: write

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20.x'
  AZURE_WEBAPP_NAME: buildatlas-web
  API_URL: ${{ vars.API_URL }}

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    name: Sync Data and Deploy

    outputs:
      has_changes: ${{ steps.check_changes.outputs.has_changes }}
      changes_count: ${{ steps.check_changes.outputs.changes_count }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Need write access to push commits
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          cd packages/analysis
          pip install -r requirements.txt

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Check for changes in blob storage
        id: check_changes
        run: |
          cd packages/analysis
          python -m src.sync.blob_sync --check --target ../../apps/web/data > /tmp/changes.txt 2>&1 || true
          cat /tmp/changes.txt

          # Extract change counts
          ADDED=$(grep "Added:" /tmp/changes.txt | awk '{print $2}' || echo "0")
          MODIFIED=$(grep "Modified:" /tmp/changes.txt | awk '{print $2}' || echo "0")

          # Calculate total changes
          TOTAL=$((ADDED + MODIFIED))
          echo "Total changes detected: $TOTAL"

          if [ "$TOTAL" -gt 0 ] || [ "${{ github.event.inputs.force_deploy }}" == "true" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "changes_count=$TOTAL" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "changes_count=0" >> $GITHUB_OUTPUT
          fi
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}

      - name: Sync data from blob storage
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          cd packages/analysis

          # Sync based on input period or all latest
          if [ -n "${{ github.event.inputs.period }}" ]; then
            echo "Syncing period: ${{ github.event.inputs.period }}"
            python -m src.sync.blob_sync --period "${{ github.event.inputs.period }}" --target ../../apps/web/data --manifest
          else
            echo "Syncing all latest data"
            python -m src.sync.blob_sync --target ../../apps/web/data --manifest
          fi
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}

      - name: Commit synced data
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Add all synced data
          git add apps/web/data/

          # Check if there are actual changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "skip_build=true" >> $GITHUB_ENV
          else
            # Create commit message with summary
            CHANGES="${{ steps.check_changes.outputs.changes_count }}"
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")

            git commit -m "$(cat <<'EOF'
          Sync blob storage data (${{ steps.check_changes.outputs.changes_count }} updates)

          Synced at: $TIMESTAMP
          Trigger: ${{ github.event_name }}

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          EOF
            )"

            git push
            echo "skip_build=false" >> $GITHUB_ENV
          fi

      - name: Install pnpm
        if: steps.check_changes.outputs.has_changes == 'true' && env.skip_build != 'true'
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        if: steps.check_changes.outputs.has_changes == 'true' && env.skip_build != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.check_changes.outputs.has_changes == 'true' && env.skip_build != 'true'
        # Playwright is a devDependency for web CI; sync-data does not need browser downloads.
        run: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 pnpm install

      - name: Clear Next.js cache
        if: steps.check_changes.outputs.has_changes == 'true' && env.skip_build != 'true'
        run: rm -rf apps/web/.next

      - name: Build frontend
        if: steps.check_changes.outputs.has_changes == 'true' && env.skip_build != 'true'
        run: pnpm --filter web build
        env:
          # Keep consistent with frontend-deploy.yml (Front Door endpoint is the canonical prod API URL)
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL || 'https://startupapi-f7gfbpbtbtfqdmdv.b02.azurefd.net' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_URL: ${{ vars.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

      - name: Prepare deployment package
        if: steps.check_changes.outputs.has_changes == 'true' && env.skip_build != 'true'
        run: |
          cd apps/web
          mkdir -p deploy

          # Copy the web app from standalone (monorepo structure: standalone/apps/web)
          cp -r .next/standalone/apps/web/. deploy/

          # Copy shared node_modules from root standalone
          cp -r .next/standalone/node_modules/. deploy/node_modules/

          # Copy static files
          mkdir -p deploy/.next/static
          cp -r .next/static/. deploy/.next/static/

          # Copy public folder
          cp -r public deploy/public

          # Zip for deployment
          cd deploy && zip -r ../deploy.zip . && cd ..

      - name: Configure App Service settings
        if: steps.check_changes.outputs.has_changes == 'true' && env.skip_build != 'true'
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          app-settings-json: |
            [
              { "name": "DATABASE_URL", "value": "${{ secrets.DATABASE_URL }}", "slotSetting": false },
              { "name": "AUTH_SECRET", "value": "${{ secrets.NEXTAUTH_SECRET }}", "slotSetting": false },
              { "name": "NEXTAUTH_SECRET", "value": "${{ secrets.NEXTAUTH_SECRET }}", "slotSetting": false },
              { "name": "NEXTAUTH_URL", "value": "${{ vars.NEXTAUTH_URL }}", "slotSetting": false },
              { "name": "GOOGLE_CLIENT_ID", "value": "${{ secrets.GOOGLE_CLIENT_ID }}", "slotSetting": false },
              { "name": "GOOGLE_CLIENT_SECRET", "value": "${{ secrets.GOOGLE_CLIENT_SECRET }}", "slotSetting": false },
              { "name": "NODE_ENV", "value": "production", "slotSetting": false }
            ]

      - name: Deploy to Azure Web App
        if: steps.check_changes.outputs.has_changes == 'true' && env.skip_build != 'true'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: apps/web/deploy.zip

      - name: Summary
        run: |
          echo "## Sync Data Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Changes Detected | ${{ steps.check_changes.outputs.changes_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Has Changes | ${{ steps.check_changes.outputs.has_changes }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ] && [ "${{ env.skip_build }}" != "true" ]; then
            echo "| Status | Deployed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
            echo "| Status | Synced (no deploy needed) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Status | No changes |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify Slack (failure)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "Sync data/deploy failed"
          SLACK_STATUS: "failure"
          SLACK_BODY: |
            *Workflow:* `${{ github.workflow }}`
            *Job:* `sync-and-deploy`
            *Ref:* `${{ github.ref_name }}`
            *SHA:* `${{ github.sha }}`
          SLACK_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 scripts/slack_notify.py
