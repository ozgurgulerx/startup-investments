name: Deploy Frontend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: buildatlas-web
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Clear Next.js cache
        run: rm -rf apps/web/.next

      - name: Build frontend
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_URL: ${{ vars.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

      - name: Prepare deployment package
        run: |
          cd apps/web
          mkdir -p deploy

          # Use rsync with --copy-links to fully dereference all pnpm symlinks
          rsync -a --copy-links .next/standalone/apps/web/ deploy/
          rsync -a --copy-links .next/standalone/node_modules/ deploy/node_modules/

          # Copy static files
          mkdir -p deploy/.next/static
          rsync -a .next/static/ deploy/.next/static/

          # Copy public folder
          rsync -a public/ deploy/public/

          # Remove any files that might trigger Oryx behaviors
          rm -f deploy/node_modules.tar.gz
          rm -f deploy/oryx-manifest.toml
          rm -f deploy/.oryx-manifest.toml

          # Fix pnpm symlink resolution issue
          # pnpm uses symlinks that may point outside the standalone output
          # We need to fix all broken/missing packages at root node_modules level
          echo "=== Fixing pnpm symlink resolution ==="

          # Function to fix a package by copying from .pnpm store or full node_modules
          fix_package() {
            local PKG=$1
            local PKG_PATH="deploy/node_modules/$PKG"

            # Check if package is missing, a broken symlink, or a symlink (not a real dir)
            if [ ! -e "$PKG_PATH" ] || [ -L "$PKG_PATH" ]; then
              echo "Fixing $PKG..."
              rm -rf "$PKG_PATH"

              # For scoped packages (@scope/name), search using full path pattern
              # pnpm stores them as @scope/name inside node_modules
              local PKG_SRC=$(find deploy/node_modules/.pnpm -type d -path "*node_modules/$PKG" 2>/dev/null | head -1)

              # If not found in standalone, try the full project node_modules
              if [ -z "$PKG_SRC" ]; then
                PKG_SRC=$(find ../../node_modules/.pnpm -type d -path "*node_modules/$PKG" 2>/dev/null | head -1)
              fi

              if [ -n "$PKG_SRC" ]; then
                mkdir -p "$(dirname "$PKG_PATH")"
                cp -rL "$PKG_SRC" "$PKG_PATH"
                echo "  -> Copied from $PKG_SRC"
              else
                echo "  -> Warning: $PKG not found (may not be needed)"
              fi
            fi
          }

          # Fix critical packages required by Next.js runtime
          # These are the packages that Next.js needs but pnpm's symlinks break
          CRITICAL_PACKAGES=(
            "styled-jsx"
            "@swc/helpers"
            "@next/env"
            "client-only"
            "server-only"
            "next-auth"
            "@auth/core"
            "@panva/hkdf"
            "jose"
            "oauth4webapi"
            "preact"
            "preact-render-to-string"
            "caniuse-lite"
            "postcss"
            "react"
            "react-dom"
            "pg"
            "pg-types"
            "pg-pool"
            "pg-protocol"
            "pg-connection-string"
            "pgpass"
            "buffer-writer"
            "packet-reader"
            "postgres-array"
            "postgres-bytea"
            "postgres-date"
            "postgres-interval"
            "pg-int8"
            "scheduler"
          )

          for PKG in "${CRITICAL_PACKAGES[@]}"; do
            fix_package "$PKG"
          done

          # Also fix any remaining broken symlinks at the root level
          echo "=== Checking for other broken symlinks ==="
          for LINK in $(find deploy/node_modules -maxdepth 2 -type l 2>/dev/null); do
            if [ ! -e "$LINK" ]; then
              PKG_NAME=$(basename "$LINK")
              echo "Found broken symlink: $LINK"
              rm -f "$LINK"
              PKG_SRC=$(find deploy/node_modules/.pnpm -type d -name "$PKG_NAME" -path "*node_modules/$PKG_NAME" 2>/dev/null | head -1)
              if [ -n "$PKG_SRC" ]; then
                cp -r "$PKG_SRC" "$LINK"
                echo "  -> Fixed from $PKG_SRC"
              fi
            fi
          done

          # Debug: verify critical packages exist
          echo "=== Verifying critical packages ==="
          ls -la deploy/node_modules/styled-jsx/package.json 2>/dev/null || echo "MISSING: styled-jsx"
          ls -la deploy/node_modules/@swc/helpers/package.json 2>/dev/null || echo "MISSING: @swc/helpers"
          ls -la deploy/node_modules/next/package.json 2>/dev/null || echo "MISSING: next"

          # Zip for deployment
          cd deploy && zip -r ../deploy.zip . && cd ..

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Configure App Service settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          app-settings-json: |
            [
              { "name": "DATABASE_URL", "value": "${{ secrets.DATABASE_URL }}", "slotSetting": false },
              { "name": "AUTH_SECRET", "value": "${{ secrets.NEXTAUTH_SECRET }}", "slotSetting": false },
              { "name": "NEXTAUTH_SECRET", "value": "${{ secrets.NEXTAUTH_SECRET }}", "slotSetting": false },
              { "name": "NEXTAUTH_URL", "value": "${{ vars.NEXTAUTH_URL }}", "slotSetting": false },
              { "name": "GOOGLE_CLIENT_ID", "value": "${{ secrets.GOOGLE_CLIENT_ID }}", "slotSetting": false },
              { "name": "GOOGLE_CLIENT_SECRET", "value": "${{ secrets.GOOGLE_CLIENT_SECRET }}", "slotSetting": false },
              { "name": "NODE_ENV", "value": "production", "slotSetting": false },
              { "name": "WEBSITE_RUN_FROM_PACKAGE", "value": "1", "slotSetting": false },
              { "name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "false", "slotSetting": false }
            ]

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: apps/web/deploy.zip
