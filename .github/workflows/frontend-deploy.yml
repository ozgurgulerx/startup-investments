name: Deploy Frontend to Azure App Service

on:
  # VM cron handles frontend deploys now (infrastructure/vm-cron/jobs/frontend-deploy.sh)
  # This workflow is kept as a manual backup only
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: buildatlas-web
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Clear Next.js cache
        run: rm -rf apps/web/.next

      - name: Build frontend
        run: pnpm --filter web build
        env:
          # Prefer the repo variable if set; otherwise fall back to Front Door endpoint
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL || 'https://startupapi-f7gfbpbtbtfqdmdv.b02.azurefd.net' }}
          API_KEY: ${{ secrets.API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_URL: ${{ vars.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          # PostHog Analytics
          # Prefer the Project API key (phc_...) if configured; POSTHOG_KEY is legacy/back-compat.
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.POSTHOG_PROJECT_API_KEY || secrets.POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
          # Microsoft Clarity (public project id, not a secret)
          NEXT_PUBLIC_CLARITY_PROJECT_ID: ${{ vars.CLARITY_PROJECT_ID || secrets.CLARITY_PROJECT_ID }}

      - name: Prepare deployment package
        run: |
          cd apps/web
          mkdir -p deploy

          # Use rsync with --copy-links to fully dereference all pnpm symlinks
          rsync -a --copy-links .next/standalone/apps/web/ deploy/
          rsync -a --copy-links .next/standalone/node_modules/ deploy/node_modules/

          # Copy static files
          mkdir -p deploy/.next/static
          rsync -a .next/static/ deploy/.next/static/

          # Copy public folder
          rsync -a public/ deploy/public/

          # Copy file-based datasets (global + regional). Required for `region != global`
          # and for API-down fallback.
          rsync -a data/ deploy/data/

          # Remove any files that might trigger Oryx behaviors
          rm -f deploy/node_modules.tar.gz
          rm -f deploy/oryx-manifest.toml
          rm -f deploy/.oryx-manifest.toml

          # Fix pnpm symlink resolution issue
          # pnpm uses symlinks that may point outside the standalone output
          # We need to fix all broken/missing packages at root node_modules level
          echo "=== Fixing pnpm symlink resolution ==="

          # Function to fix a package by copying from .pnpm store or full node_modules
          # For critical packages, ALWAYS recopy to ensure completeness
          # (rsync --copy-links can create incomplete directories when symlinks point outside)
          fix_package() {
            local PKG=$1
            local PKG_PATH="deploy/node_modules/$PKG"
            local FORCE=${2:-false}

            # Check if package needs fixing: missing, is a symlink, or forced
            if [ ! -e "$PKG_PATH" ] || [ -L "$PKG_PATH" ] || [ "$FORCE" = "true" ]; then
              echo "Fixing $PKG..."
              rm -rf "$PKG_PATH"

              # For scoped packages (@scope/name), search using full path pattern
              # pnpm stores them as @scope/name inside node_modules
              local PKG_SRC=$(find deploy/node_modules/.pnpm -type d -path "*node_modules/$PKG" 2>/dev/null | head -1)

              # If not found in standalone, try the full project node_modules
              if [ -z "$PKG_SRC" ]; then
                PKG_SRC=$(find ../../node_modules/.pnpm -type d -path "*node_modules/$PKG" 2>/dev/null | head -1)
              fi

              if [ -n "$PKG_SRC" ]; then
                mkdir -p "$(dirname "$PKG_PATH")"
                cp -rL "$PKG_SRC" "$PKG_PATH"
                echo "  -> Copied from $PKG_SRC"
              else
                echo "  -> Warning: $PKG not found (may not be needed)"
              fi
            fi
          }

          # Fix critical packages required by Next.js runtime
          # These are the packages that Next.js needs but pnpm's symlinks break
          CRITICAL_PACKAGES=(
            "styled-jsx"
            "@swc/helpers"
            "@next/env"
            "client-only"
            "server-only"
            "next-auth"
            "@auth/core"
            "@panva/hkdf"
            "jose"
            "oauth4webapi"
            "preact"
            "preact-render-to-string"
            "caniuse-lite"
            "postcss"
            "react"
            "react-dom"
            "pg"
            "pg-types"
            "pg-pool"
            "pg-protocol"
            "pg-connection-string"
            "pgpass"
            "buffer-writer"
            "packet-reader"
            "postgres-array"
            "postgres-bytea"
            "postgres-date"
            "postgres-interval"
            "pg-int8"
            "scheduler"
            "xtend"
            "split2"
            "obuf"
            "bcryptjs"
          )

          for PKG in "${CRITICAL_PACKAGES[@]}"; do
            fix_package "$PKG" true  # Force recopy critical packages
          done

          # Fix ALL broken symlinks recursively (not just root level)
          echo "=== Checking for all broken symlinks recursively ==="
          MAX_ITERATIONS=5
          for i in $(seq 1 $MAX_ITERATIONS); do
            FOUND_BROKEN=0
            echo "Pass $i: Scanning for broken symlinks..."
            while IFS= read -r LINK; do
              if [ -n "$LINK" ] && [ ! -e "$LINK" ]; then
                FOUND_BROKEN=1
                PKG_NAME=$(basename "$LINK")
                PARENT_DIR=$(dirname "$LINK")
                echo "Found broken symlink: $LINK"
                rm -f "$LINK"

                # Try to find in .pnpm store
                PKG_SRC=$(find deploy/node_modules/.pnpm -type d -name "$PKG_NAME" -path "*node_modules/$PKG_NAME" 2>/dev/null | head -1)

                # If not found, try root project node_modules
                if [ -z "$PKG_SRC" ]; then
                  PKG_SRC=$(find ../../node_modules/.pnpm -type d -name "$PKG_NAME" -path "*node_modules/$PKG_NAME" 2>/dev/null | head -1)
                fi

                if [ -n "$PKG_SRC" ]; then
                  cp -rL "$PKG_SRC" "$LINK"
                  echo "  -> Fixed from $PKG_SRC"
                fi
              fi
            done < <(find deploy/node_modules -type l 2>/dev/null)

            if [ $FOUND_BROKEN -eq 0 ]; then
              echo "No more broken symlinks found after pass $i"
              break
            fi
          done

          # Debug: verify critical packages exist
          echo "=== Verifying critical packages ==="
          ls -la deploy/node_modules/styled-jsx/package.json 2>/dev/null || echo "MISSING: styled-jsx"
          ls -la deploy/node_modules/@swc/helpers/package.json 2>/dev/null || echo "MISSING: @swc/helpers"
          ls -la deploy/node_modules/next/package.json 2>/dev/null || echo "MISSING: next"
          ls -la deploy/node_modules/xtend/mutable.js 2>/dev/null || echo "MISSING: xtend/mutable.js"
          ls -la deploy/node_modules/postgres-interval/package.json 2>/dev/null || echo "MISSING: postgres-interval"
          ls -la deploy/node_modules/pg/package.json 2>/dev/null || echo "MISSING: pg"

          # Zip for deployment
          cd deploy && zip -r ../deploy.zip . && cd ..

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Configure App Service settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          app-settings-json: |
            [
              { "name": "DATABASE_URL", "value": "${{ secrets.DATABASE_URL }}", "slotSetting": false },
              { "name": "AUTH_SECRET", "value": "${{ secrets.NEXTAUTH_SECRET }}", "slotSetting": false },
              { "name": "NEXTAUTH_SECRET", "value": "${{ secrets.NEXTAUTH_SECRET }}", "slotSetting": false },
              { "name": "NEXTAUTH_URL", "value": "${{ vars.NEXTAUTH_URL }}", "slotSetting": false },
              { "name": "GOOGLE_CLIENT_ID", "value": "${{ secrets.GOOGLE_CLIENT_ID }}", "slotSetting": false },
              { "name": "GOOGLE_CLIENT_SECRET", "value": "${{ secrets.GOOGLE_CLIENT_SECRET }}", "slotSetting": false },
              { "name": "NODE_ENV", "value": "production", "slotSetting": false },
              { "name": "WEBSITE_RUN_FROM_PACKAGE", "value": "1", "slotSetting": false },
              { "name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "false", "slotSetting": false },
              { "name": "NEXT_PUBLIC_API_URL", "value": "https://startupapi-f7gfbpbtbtfqdmdv.b02.azurefd.net", "slotSetting": false },
              { "name": "API_KEY", "value": "${{ secrets.API_KEY }}", "slotSetting": false },
              { "name": "ADMIN_KEY", "value": "${{ secrets.ADMIN_KEY }}", "slotSetting": false },
              { "name": "PUBLIC_BASE_URL", "value": "${{ secrets.PUBLIC_BASE_URL }}", "slotSetting": false },
              { "name": "RESEND_API_KEY", "value": "${{ secrets.RESEND_API_KEY }}", "slotSetting": false },
              { "name": "NEWS_DIGEST_FROM_EMAIL", "value": "${{ secrets.NEWS_DIGEST_FROM_EMAIL }}", "slotSetting": false },
              { "name": "NEWS_DIGEST_REPLY_TO", "value": "${{ secrets.NEWS_DIGEST_REPLY_TO }}", "slotSetting": false },
              { "name": "NEXT_PUBLIC_POSTHOG_KEY", "value": "${{ secrets.POSTHOG_PROJECT_API_KEY || secrets.POSTHOG_KEY }}", "slotSetting": false },
              { "name": "NEXT_PUBLIC_POSTHOG_HOST", "value": "https://us.i.posthog.com", "slotSetting": false },
              { "name": "NEXT_PUBLIC_CLARITY_PROJECT_ID", "value": "${{ vars.CLARITY_PROJECT_ID || secrets.CLARITY_PROJECT_ID }}", "slotSetting": false }
            ]

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: apps/web/deploy.zip

      - name: Notify Slack (failure)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "Frontend deploy failed"
          SLACK_STATUS: "failure"
          SLACK_BODY: |
            *Workflow:* `${{ github.workflow }}`
            *Job:* `build-and-deploy`
            *Ref:* `${{ github.ref_name }}`
            *SHA:* `${{ github.sha }}`
          SLACK_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 scripts/slack_notify.py
