name: Deploy Frontend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: buildatlas-web
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Clear Next.js cache
        run: rm -rf apps/web/.next

      - name: Build frontend
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_URL: ${{ vars.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

      - name: Prepare deployment package
        run: |
          cd apps/web
          mkdir -p deploy

          # Use rsync with --copy-links to fully dereference all pnpm symlinks
          rsync -a --copy-links .next/standalone/apps/web/ deploy/
          rsync -a --copy-links .next/standalone/node_modules/ deploy/node_modules/

          # Copy static files
          mkdir -p deploy/.next/static
          rsync -a .next/static/ deploy/.next/static/

          # Copy public folder
          rsync -a public/ deploy/public/

          # Remove any files that might trigger Oryx behaviors
          rm -f deploy/node_modules.tar.gz
          rm -f deploy/oryx-manifest.toml
          rm -f deploy/.oryx-manifest.toml

          # Fix pnpm symlink resolution issue: ensure critical packages are at root node_modules
          # pnpm uses symlinks like node_modules/pkg -> .pnpm/pkg@version/node_modules/pkg
          # If the symlink target isn't included in standalone output, the symlink breaks
          echo "=== Fixing pnpm symlink resolution ==="

          # styled-jsx is required by next at runtime
          if [ ! -d "deploy/node_modules/styled-jsx" ] || [ -L "deploy/node_modules/styled-jsx" ]; then
            echo "Fixing styled-jsx..."
            rm -rf deploy/node_modules/styled-jsx
            STYLED_JSX_SRC=$(find deploy/node_modules/.pnpm -type d -name "styled-jsx" -path "*node_modules/styled-jsx" 2>/dev/null | head -1)
            if [ -n "$STYLED_JSX_SRC" ]; then
              cp -r "$STYLED_JSX_SRC" deploy/node_modules/styled-jsx
              echo "Copied styled-jsx from $STYLED_JSX_SRC"
            else
              echo "ERROR: styled-jsx not found in .pnpm store!"
              exit 1
            fi
          fi

          # next-auth packages are required for auth
          for PKG in next-auth @auth/core; do
            PKG_DIR=$(echo "$PKG" | tr '/' '-')
            if [ ! -d "deploy/node_modules/$PKG" ] || [ -L "deploy/node_modules/$PKG" ]; then
              echo "Fixing $PKG..."
              rm -rf "deploy/node_modules/$PKG"
              PKG_SRC=$(find deploy/node_modules/.pnpm -type d -name "$(basename $PKG)" -path "*node_modules/$(basename $PKG)" 2>/dev/null | grep -v "node_modules/.*node_modules" | head -1)
              if [ -n "$PKG_SRC" ]; then
                mkdir -p "deploy/node_modules/$(dirname $PKG)"
                cp -r "$PKG_SRC" "deploy/node_modules/$PKG"
                echo "Copied $PKG from $PKG_SRC"
              else
                echo "Warning: $PKG not found in .pnpm store (may not be needed)"
              fi
            fi
          done

          # Debug: verify critical packages exist
          echo "=== Verifying critical packages ==="
          ls -la deploy/node_modules/styled-jsx/package.json 2>/dev/null || echo "MISSING: styled-jsx"
          ls -la deploy/node_modules/next/package.json 2>/dev/null || echo "MISSING: next"

          # Zip for deployment
          cd deploy && zip -r ../deploy.zip . && cd ..

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Configure App Service settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          app-settings-json: |
            [
              { "name": "DATABASE_URL", "value": "${{ secrets.DATABASE_URL }}", "slotSetting": false },
              { "name": "AUTH_SECRET", "value": "${{ secrets.NEXTAUTH_SECRET }}", "slotSetting": false },
              { "name": "NEXTAUTH_SECRET", "value": "${{ secrets.NEXTAUTH_SECRET }}", "slotSetting": false },
              { "name": "NEXTAUTH_URL", "value": "${{ vars.NEXTAUTH_URL }}", "slotSetting": false },
              { "name": "GOOGLE_CLIENT_ID", "value": "${{ secrets.GOOGLE_CLIENT_ID }}", "slotSetting": false },
              { "name": "GOOGLE_CLIENT_SECRET", "value": "${{ secrets.GOOGLE_CLIENT_SECRET }}", "slotSetting": false },
              { "name": "NODE_ENV", "value": "production", "slotSetting": false },
              { "name": "WEBSITE_RUN_FROM_PACKAGE", "value": "1", "slotSetting": false },
              { "name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "false", "slotSetting": false }
            ]

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: apps/web/deploy.zip
