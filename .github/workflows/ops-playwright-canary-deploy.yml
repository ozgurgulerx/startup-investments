name: Deploy Ops Playwright Canary (AKS)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: aistartuptr
  AKS_CLUSTER_NAME: aks-aistartuptr
  AKS_RESOURCE_GROUP: aistartuptr
  IMAGE_NAME: buildatlas-playwright-canary
  CRONJOB_NAME: browser-canary-landscapes
  NAMESPACE: default

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push canary image
        run: |
          docker build -f infrastructure/ops/playwright-canary/Dockerfile -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure AKS is running
        shell: bash
        run: |
          state="$(az aks show -g "${{ env.AKS_RESOURCE_GROUP }}" -n "${{ env.AKS_CLUSTER_NAME }}" --query "powerState.code" -o tsv 2>/dev/null || echo "UNKNOWN")"
          echo "AKS power state: $state"

          if [ "$state" = "Stopped" ]; then
            echo "AKS is stopped, starting..."
            az aks start -g "${{ env.AKS_RESOURCE_GROUP }}" -n "${{ env.AKS_CLUSTER_NAME }}"
          fi

          for i in {1..60}; do
            state="$(az aks show -g "${{ env.AKS_RESOURCE_GROUP }}" -n "${{ env.AKS_CLUSTER_NAME }}" --query "powerState.code" -o tsv 2>/dev/null || echo "UNKNOWN")"
            if [ "$state" = "Running" ]; then
              echo "AKS is Running."
              exit 0
            fi
            echo "Waiting for AKS to be Running (attempt=$i, state=$state)..."
            sleep 10
          done

          echo "::error::AKS did not reach Running state (state=$state)"
          exit 1

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Verify ops secrets exist
        run: |
          kubectl get secret -n "${{ env.NAMESPACE }}" buildatlas-ops-secrets >/dev/null

      - name: Deploy CronJob
        run: |
          tag="${{ github.sha }}"
          sed "s/__IMAGE_TAG__/${tag}/g" infrastructure/kubernetes/playwright-canary-cronjob.yaml | kubectl apply -n "${{ env.NAMESPACE }}" -f -

      - name: Run CronJob once (verification)
        run: |
          job="${{ env.CRONJOB_NAME }}-manual-${{ github.run_id }}"
          kubectl create job -n "${{ env.NAMESPACE }}" --from=cronjob/${{ env.CRONJOB_NAME }} "$job"
          kubectl wait -n "${{ env.NAMESPACE }}" --for=condition=complete "job/$job" --timeout=540s
          kubectl logs -n "${{ env.NAMESPACE }}" "job/$job"

