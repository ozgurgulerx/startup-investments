name: Sync Data to Database

on:
  # VM cron handles DB sync now (infrastructure/vm-cron/jobs/sync-data.sh)
  # This workflow is kept as a manual backup only
  workflow_dispatch:
    inputs:
      period:
        description: 'Period to sync (YYYY-MM)'
        required: false
        type: string
        default: '2026-01'
      regenerate_only:
        description: 'Only regenerate data, skip database sync'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  API_URL: https://startupapi-f7gfbpbtbtfqdmdv.b02.azurefd.net

jobs:
  regenerate-and-sync:
    runs-on: ubuntu-latest
    name: Regenerate Data & Sync to Database

    steps:
      - uses: actions/checkout@v4
        with:
          # We need history for period auto-detection via git diff.
          fetch-depth: 50

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ripgrep (rg)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ripgrep

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: |
          pnpm install
          pip install psycopg2-binary

      - name: Determine period
        id: period
        run: |
          if [ -n "${{ github.event.inputs.period }}" ]; then
            PERIOD="${{ github.event.inputs.period }}"
          else
            # Derive period from changed paths, else fall back to most recent directory under apps/web/data/
            BEFORE_SHA="${{ github.event.before }}"
            AFTER_SHA="${{ github.sha }}"
            if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
              RANGE="$BEFORE_SHA..$AFTER_SHA"
            else
              RANGE="$AFTER_SHA~1..$AFTER_SHA"
            fi

            # Try global path first, then TR path
            PERIOD="$(git diff --name-only "$RANGE" 2>/dev/null | rg -o 'apps/web/data/\\d{4}-\\d{2}' | head -n 1 | sed 's#apps/web/data/##' || true)"
            if [ -z "$PERIOD" ]; then
              PERIOD="$(git diff --name-only "$RANGE" 2>/dev/null | rg -o 'apps/web/data/tr/\\d{4}-\\d{2}' | head -n 1 | sed 's#apps/web/data/tr/##' || true)"
            fi
            if [ -z "$PERIOD" ]; then
              PERIOD="$(ls -1 apps/web/data 2>/dev/null | rg '^\\d{4}-\\d{2}$' | sort -r | head -n 1 || true)"
            fi
            if [ -z "$PERIOD" ]; then
              PERIOD="2026-01"
            fi
          fi
          echo "period=$PERIOD" >> $GITHUB_OUTPUT
          echo "Using period: $PERIOD"

          # Detect if TR data exists for this period
          if [ -d "apps/web/data/tr/$PERIOD" ]; then
            echo "tr_exists=true" >> $GITHUB_OUTPUT
            echo "TR data found for period $PERIOD"
          else
            echo "tr_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate vertical_taxonomy present in analysis_store (global + tr if present)
        if: github.event.inputs.regenerate_only != 'true'
        run: |
          PERIOD="${{ steps.period.outputs.period }}"
          python3 scripts/check-vertical-taxonomy.py --period "$PERIOD" --region global
          # Turkey dataset is optional; only validate when folder exists for that period.
          if [ -d "apps/web/data/tr/$PERIOD/output/analysis_store/base_analyses" ]; then
            python3 scripts/check-vertical-taxonomy.py --period "$PERIOD" --region tr
          fi

      - name: Check if CSV exists
        id: check_csv
        run: |
          CSV_PATH="apps/web/data/${{ steps.period.outputs.period }}/input/startups.csv"
          if [ -f "$CSV_PATH" ]; then
            echo "csv_exists=true" >> $GITHUB_OUTPUT
            echo "csv_path=$CSV_PATH" >> $GITHUB_OUTPUT
            echo "Found CSV: $CSV_PATH"
            wc -l "$CSV_PATH"
          else
            echo "csv_exists=false" >> $GITHUB_OUTPUT
            echo "CSV not found: $CSV_PATH"
          fi

          # Check TR CSV
          TR_CSV_PATH="apps/web/data/tr/${{ steps.period.outputs.period }}/input/startups.csv"
          if [ -f "$TR_CSV_PATH" ]; then
            echo "tr_csv_exists=true" >> $GITHUB_OUTPUT
            echo "tr_csv_path=$TR_CSV_PATH" >> $GITHUB_OUTPUT
            echo "Found TR CSV: $TR_CSV_PATH"
            wc -l "$TR_CSV_PATH"
          else
            echo "tr_csv_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate required secrets for sync
        if: steps.check_csv.outputs.csv_exists == 'true' && github.event.inputs.regenerate_only != 'true'
        env:
          API_KEY: ${{ secrets.API_KEY }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          for key in API_KEY ADMIN_KEY DATABASE_URL; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              exit 1
            fi
          done

      # ============================================
      # Step 1: Regenerate Monthly Stats (deal_summary + genai_analysis)
      # ============================================
      - name: Regenerate monthly_stats.json
        if: steps.check_csv.outputs.csv_exists == 'true'
        run: |
          PERIOD="${{ steps.period.outputs.period }}"
          CSV_PATH="${{ steps.check_csv.outputs.csv_path }}"
          python3 << EOF
          from pathlib import Path
          import json
          import csv
          import statistics
          from collections import defaultdict

          csv_path = Path('$CSV_PATH')
          analysis_store_path = Path('apps/web/data/$PERIOD/output/analysis_store')
          stats_path = Path('apps/web/data/$PERIOD/output/monthly_stats.json')

          # Load existing stats or create new
          if stats_path.exists():
              with open(stats_path, 'r') as f:
                  stats = json.load(f)
          else:
              stats = {'period': '$PERIOD'}

          # ============================================
          # Recalculate deal_summary from CSV
          # This ensures total_deals is always accurate
          # ============================================
          funding_amounts = []
          with open(csv_path, 'r', encoding='utf-8') as f:
              reader = csv.DictReader(f)
              rows = list(reader)
              for row in rows:
                  amount_str = row.get('Money Raised (in USD)', '').replace(',', '').strip()
                  if amount_str:
                      try:
                          amount = float(amount_str)
                          if amount > 0:
                              funding_amounts.append(amount)
                      except ValueError:
                          pass

          total_deals = len(rows)
          stats['deal_summary'] = {
              'total_deals': total_deals,
              'deals_with_funding': len(funding_amounts),
              'total_funding_usd': sum(funding_amounts) if funding_amounts else 0,
              'average_deal_size': statistics.mean(funding_amounts) if funding_amounts else 0,
              'median_deal_size': statistics.median(funding_amounts) if funding_amounts else 0,
              'min_deal_size': min(funding_amounts) if funding_amounts else 0,
              'max_deal_size': max(funding_amounts) if funding_amounts else 0,
          }
          print(f"Updated deal_summary: {total_deals} total deals")

          # ============================================
          # Update genai_analysis from analysis store
          # ============================================
          base_path = analysis_store_path / 'base_analyses'
          analyses = []
          if base_path.exists():
              for f in base_path.glob('*.json'):
                  with open(f, 'r') as fp:
                      analyses.append(json.load(fp))

          if analyses:
              uses_genai_count = sum(1 for a in analyses if a.get('uses_genai', False))

              intensity_dist, pattern_dist, newsletter_dist = {}, {}, {}
              vertical_dist, market_dist, depth_dist = {}, {}, {}

              for a in analyses:
                  intensity = a.get('genai_intensity', 'none')
                  intensity_dist[intensity] = intensity_dist.get(intensity, 0) + 1

                  for p in a.get('build_patterns', []):
                      name = p.get('name', p) if isinstance(p, dict) else p
                      pattern_dist[name] = pattern_dist.get(name, 0) + 1

                  nl = a.get('newsletter_potential', 'low')
                  newsletter_dist[nl] = newsletter_dist.get(nl, 0) + 1

                  vertical = a.get('sub_vertical') or a.get('vertical', 'unknown')
                  vertical_dist[vertical] = vertical_dist.get(vertical, 0) + 1

                  market = a.get('market_type', 'unknown')
                  market_dist[market] = market_dist.get(market, 0) + 1

                  depth = a.get('technical_depth', 'unknown')
                  depth_dist[depth] = depth_dist.get(depth, 0) + 1

              stats['genai_analysis'] = {
                  'total_analyzed': len(analyses),
                  'uses_genai_count': uses_genai_count,
                  'genai_adoption_rate': uses_genai_count / len(analyses) if analyses else 0,
                  'intensity_distribution': dict(sorted(intensity_dist.items(), key=lambda x: -x[1])),
                  'pattern_distribution': dict(sorted(pattern_dist.items(), key=lambda x: -x[1])),
                  'newsletter_potential': dict(sorted(newsletter_dist.items(), key=lambda x: -x[1])),
                  'vertical_distribution': dict(sorted(vertical_dist.items(), key=lambda x: -x[1])[:20]),
                  'market_type_distribution': market_dist,
                  'technical_depth_distribution': depth_dist,
                  'high_potential_startups': [
                      a.get('company_name') for a in analyses
                      if a.get('newsletter_potential') == 'high'
                  ][:20]
              }
              print(f"Updated genai_analysis: {len(analyses)} analyzed")

          with open(stats_path, 'w') as f:
              json.dump(stats, f, indent=2)
          EOF

      # ============================================
      # Step 2: Regenerate Monthly Brief
      # ============================================
      - name: Regenerate monthly_brief.json
        if: steps.check_csv.outputs.csv_exists == 'true'
        working-directory: apps/web
        run: |
          PERIOD="${{ steps.period.outputs.period }}"
          npx tsx -e "
          const { generateMonthlyBrief } = require('./lib/data/generate-monthly-brief');
          const fs = require('fs');
          const path = require('path');

          async function main() {
            const brief = await generateMonthlyBrief('$PERIOD');
            const outputPath = path.join(process.cwd(), 'data', '$PERIOD', 'output', 'monthly_brief.json');
            fs.writeFileSync(outputPath, JSON.stringify(brief, null, 2));
            console.log('Generated monthly brief at:', brief.generatedAt);
            console.log('Total deals:', brief.metrics.totalDeals);
          }

          main().catch(e => { console.error('Error:', e.message); process.exit(1); });
          "

      # ============================================
      # Step 3: Copy Brief to Public Directories
      # ============================================
      - name: Copy brief to public directories
        if: steps.check_csv.outputs.csv_exists == 'true'
        run: |
          PERIOD="${{ steps.period.outputs.period }}"

          # Copy full brief to public/data/briefs/
          cp "apps/web/data/$PERIOD/output/monthly_brief.json" "apps/web/public/data/briefs/$PERIOD.json" || true
          echo "Copied to public/data/briefs/$PERIOD.json"

          # Update public/data/briefings/ with key stats
          python3 << EOF
          import json
          from pathlib import Path

          brief_path = Path(f"apps/web/data/$PERIOD/output/monthly_brief.json")
          briefings_path = Path(f"apps/web/public/data/briefings/$PERIOD.json")

          if not brief_path.exists():
              print("Brief not found, skipping")
              exit(0)

          with open(brief_path, 'r') as f:
              brief = json.load(f)

          if not briefings_path.exists():
              print("Briefings file not found, skipping")
              exit(0)

          with open(briefings_path, 'r') as f:
              briefings = json.load(f)

          # Update key stats
          briefings['stats']['totalDeals'] = brief['metrics']['totalDeals']
          briefings['stats']['totalFunding'] = brief['metrics']['totalFunding']
          briefings['stats']['genaiAdoptionRate'] = brief['metrics']['genaiAdoptionPct']

          # Update insight text to match
          genai_pct = brief['metrics']['genaiAdoptionPct']
          briefings['insight'] = f"Capital concentrated around vertical data moats, with {genai_pct}% of funded startups building on generative AI infrastructure."

          with open(briefings_path, 'w') as f:
              json.dump(briefings, f, indent=2)

          print(f"Updated briefings with: totalDeals={brief['metrics']['totalDeals']}, genaiAdoptionRate={genai_pct}")
          EOF

      # ============================================
      # Step 4: Update Homepage Metrics (lib/copy.ts)
      # ============================================
      - name: Update homepage metrics in copy.ts
        if: steps.check_csv.outputs.csv_exists == 'true'
        run: |
          PERIOD="${{ steps.period.outputs.period }}"
          python3 << 'EOF'
          import json
          import re
          from pathlib import Path

          stats_path = Path(f"apps/web/data/${{ steps.period.outputs.period }}/output/monthly_stats.json")
          copy_path = Path("apps/web/lib/copy.ts")

          if not stats_path.exists():
              print("Stats file not found, skipping")
              exit(0)

          with open(stats_path, 'r') as f:
              stats = json.load(f)

          deal_summary = stats.get('deal_summary', {})
          genai_analysis = stats.get('genai_analysis', {})

          total_deals = deal_summary.get('total_deals', 0)
          total_funding = deal_summary.get('total_funding_usd', 0)
          genai_rate = genai_analysis.get('genai_adoption_rate', 0)

          # Format values
          companies_value = str(total_deals)
          capital_value = f"${total_funding / 1e9:.1f}B"
          genai_value = f"{int(genai_rate * 100)}%"

          # Read copy.ts
          content = copy_path.read_text()

          # Update companies value
          content = re.sub(
              r'(companies:\s*\{\s*value:\s*")[^"]+(")',
              rf'\g<1>{companies_value}\2',
              content
          )

          # Update capital value
          content = re.sub(
              r'(capital:\s*\{\s*value:\s*")[^"]+(")',
              rf'\g<1>{capital_value}\2',
              content
          )

          # Update genai value
          content = re.sub(
              r'(genai:\s*\{\s*value:\s*")[^"]+(")',
              rf'\g<1>{genai_value}\2',
              content
          )

          copy_path.write_text(content)
          print(f"Updated copy.ts: companies={companies_value}, capital={capital_value}, genai={genai_value}")
          EOF

      # ============================================
      # Step 5: Regenerate Enriched CSV
      # ============================================
      - name: Regenerate enriched CSV
        if: steps.check_csv.outputs.csv_exists == 'true'
        run: |
          PERIOD="${{ steps.period.outputs.period }}"
          python3 << EOF
          from pathlib import Path
          import json
          import csv

          analysis_store_path = Path('apps/web/data/$PERIOD/output/analysis_store/base_analyses')
          csv_path = Path('apps/web/data/$PERIOD/input/startups.csv')
          output_path = Path('apps/web/data/$PERIOD/output/startups_enriched_with_analysis.csv')

          if not analysis_store_path.exists():
              print("Analysis store not found, skipping")
              exit(0)

          analysis_map = {}
          for f in analysis_store_path.glob('*.json'):
              with open(f, 'r') as fp:
                  a = json.load(fp)
                  key = a.get('company_name', '').lower()
                  analysis_map[key] = a

          with open(csv_path, 'r', encoding='utf-8') as f:
              reader = csv.DictReader(f)
              original_fieldnames = list(reader.fieldnames or [])
              rows = list(reader)

          analysis_cols = [
              'analysis_uses_genai', 'analysis_genai_intensity', 'analysis_models_mentioned',
              'analysis_build_patterns', 'analysis_market_type', 'analysis_sub_vertical',
              'analysis_target_market', 'analysis_newsletter_potential', 'analysis_technical_depth',
              'analysis_confidence_score', 'analysis_competitors', 'analysis_competitive_moat'
          ]

          new_fieldnames = original_fieldnames + analysis_cols
          enriched_rows = []
          matched = 0

          for row in rows:
              transaction_name = row.get('Transaction Name', '')
              company_name = transaction_name
              for prefix in ['Series A - ', 'Series B - ', 'Series C - ', 'Series D - ', 'Series E - ',
                             'Seed Round - ', 'Pre Seed Round - ', 'Venture Round - ', 'Debt Financing - ',
                             'Private Equity Round - ', 'Corporate Round - ', 'Angel Round - ', 'Funding Round - ']:
                  company_name = company_name.replace(prefix, '')
              company_name = company_name.strip()

              analysis = analysis_map.get(company_name.lower())

              if analysis:
                  matched += 1
                  patterns = analysis.get('build_patterns', [])
                  pattern_names = [p.get('name', p) if isinstance(p, dict) else p for p in patterns]

                  row['analysis_uses_genai'] = 'Yes' if analysis.get('uses_genai') else 'No'
                  row['analysis_genai_intensity'] = analysis.get('genai_intensity', '')
                  row['analysis_models_mentioned'] = '; '.join(analysis.get('models_mentioned', []))
                  row['analysis_build_patterns'] = '; '.join(pattern_names)
                  row['analysis_market_type'] = analysis.get('market_type', '')
                  row['analysis_sub_vertical'] = analysis.get('sub_vertical', '')
                  row['analysis_target_market'] = analysis.get('target_market', '')
                  row['analysis_newsletter_potential'] = analysis.get('newsletter_potential', '')
                  row['analysis_technical_depth'] = analysis.get('technical_depth', '')
                  row['analysis_confidence_score'] = str(analysis.get('confidence_score', ''))
                  row['analysis_competitors'] = ''
                  row['analysis_competitive_moat'] = ''
              else:
                  for col in analysis_cols:
                      row[col] = ''

              enriched_rows.append(row)

          with open(output_path, 'w', encoding='utf-8', newline='') as f:
              writer = csv.DictWriter(f, fieldnames=new_fieldnames)
              writer.writeheader()
              writer.writerows(enriched_rows)

          print(f"Enriched {matched}/{len(rows)} startups with analysis data")
          EOF

      # ============================================
      # Step 5b: Regenerate TR monthly_stats.json
      # ============================================
      - name: Regenerate TR monthly_stats.json
        if: steps.check_csv.outputs.tr_csv_exists == 'true'
        run: |
          PERIOD="${{ steps.period.outputs.period }}"
          TR_CSV_PATH="${{ steps.check_csv.outputs.tr_csv_path }}"
          python3 << EOF
          from pathlib import Path
          import json
          import csv
          import statistics

          csv_path = Path('$TR_CSV_PATH')
          analysis_store_path = Path('apps/web/data/tr/$PERIOD/output/analysis_store')
          stats_path = Path('apps/web/data/tr/$PERIOD/output/monthly_stats.json')

          stats_path.parent.mkdir(parents=True, exist_ok=True)

          if stats_path.exists():
              with open(stats_path, 'r') as f:
                  stats = json.load(f)
          else:
              stats = {'period': '$PERIOD', 'region': 'turkey'}

          funding_amounts = []
          with open(csv_path, 'r', encoding='utf-8') as f:
              reader = csv.DictReader(f)
              rows = list(reader)
              for row in rows:
                  amount_str = row.get('Money Raised (in USD)', '').replace(',', '').strip()
                  if amount_str:
                      try:
                          amount = float(amount_str)
                          if amount > 0:
                              funding_amounts.append(amount)
                      except ValueError:
                          pass

          total_deals = len(rows)
          stats['deal_summary'] = {
              'total_deals': total_deals,
              'deals_with_funding': len(funding_amounts),
              'total_funding_usd': sum(funding_amounts) if funding_amounts else 0,
              'average_deal_size': statistics.mean(funding_amounts) if funding_amounts else 0,
              'median_deal_size': statistics.median(funding_amounts) if funding_amounts else 0,
              'min_deal_size': min(funding_amounts) if funding_amounts else 0,
              'max_deal_size': max(funding_amounts) if funding_amounts else 0,
          }
          print(f"TR deal_summary: {total_deals} total deals")

          base_path = analysis_store_path / 'base_analyses'
          analyses = []
          if base_path.exists():
              for f in base_path.glob('*.json'):
                  with open(f, 'r') as fp:
                      analyses.append(json.load(fp))

          if analyses:
              uses_genai_count = sum(1 for a in analyses if a.get('uses_genai', False))
              intensity_dist, pattern_dist, newsletter_dist = {}, {}, {}
              vertical_dist, market_dist, depth_dist = {}, {}, {}

              for a in analyses:
                  intensity = a.get('genai_intensity', 'none')
                  intensity_dist[intensity] = intensity_dist.get(intensity, 0) + 1
                  for p in a.get('build_patterns', []):
                      name = p.get('name', p) if isinstance(p, dict) else p
                      pattern_dist[name] = pattern_dist.get(name, 0) + 1
                  nl = a.get('newsletter_potential', 'low')
                  newsletter_dist[nl] = newsletter_dist.get(nl, 0) + 1
                  vertical = a.get('sub_vertical') or a.get('vertical', 'unknown')
                  vertical_dist[vertical] = vertical_dist.get(vertical, 0) + 1
                  market = a.get('market_type', 'unknown')
                  market_dist[market] = market_dist.get(market, 0) + 1
                  depth = a.get('technical_depth', 'unknown')
                  depth_dist[depth] = depth_dist.get(depth, 0) + 1

              stats['genai_analysis'] = {
                  'total_analyzed': len(analyses),
                  'uses_genai_count': uses_genai_count,
                  'genai_adoption_rate': uses_genai_count / len(analyses) if analyses else 0,
                  'intensity_distribution': dict(sorted(intensity_dist.items(), key=lambda x: -x[1])),
                  'pattern_distribution': dict(sorted(pattern_dist.items(), key=lambda x: -x[1])),
                  'newsletter_potential': dict(sorted(newsletter_dist.items(), key=lambda x: -x[1])),
                  'vertical_distribution': dict(sorted(vertical_dist.items(), key=lambda x: -x[1])[:20]),
                  'market_type_distribution': market_dist,
                  'technical_depth_distribution': depth_dist,
                  'high_potential_startups': [
                      a.get('company_name') for a in analyses
                      if a.get('newsletter_potential') == 'high'
                  ][:20]
              }
              print(f"TR genai_analysis: {len(analyses)} analyzed")

          with open(stats_path, 'w') as f:
              json.dump(stats, f, indent=2)
          EOF

      # ============================================
      # Step 5c: Regenerate TR enriched CSV
      # ============================================
      - name: Regenerate TR enriched CSV
        if: steps.check_csv.outputs.tr_csv_exists == 'true'
        run: |
          PERIOD="${{ steps.period.outputs.period }}"
          python3 << EOF
          from pathlib import Path
          import json
          import csv

          analysis_store_path = Path('apps/web/data/tr/$PERIOD/output/analysis_store/base_analyses')
          csv_path = Path('apps/web/data/tr/$PERIOD/input/startups.csv')
          output_path = Path('apps/web/data/tr/$PERIOD/output/startups_enriched_with_analysis.csv')

          if not analysis_store_path.exists():
              print("TR analysis store not found, skipping")
              exit(0)

          analysis_map = {}
          for f in analysis_store_path.glob('*.json'):
              with open(f, 'r') as fp:
                  a = json.load(fp)
                  key = a.get('company_name', '').lower()
                  analysis_map[key] = a

          with open(csv_path, 'r', encoding='utf-8') as f:
              reader = csv.DictReader(f)
              original_fieldnames = list(reader.fieldnames or [])
              rows = list(reader)

          analysis_cols = [
              'analysis_uses_genai', 'analysis_genai_intensity', 'analysis_models_mentioned',
              'analysis_build_patterns', 'analysis_market_type', 'analysis_sub_vertical',
              'analysis_target_market', 'analysis_newsletter_potential', 'analysis_technical_depth',
              'analysis_confidence_score', 'analysis_competitors', 'analysis_competitive_moat'
          ]

          new_fieldnames = original_fieldnames + analysis_cols
          enriched_rows = []
          matched = 0

          for row in rows:
              company_name = row.get('Transaction Name', '').strip()
              analysis = analysis_map.get(company_name.lower())

              if analysis:
                  matched += 1
                  patterns = analysis.get('build_patterns', [])
                  pattern_names = [p.get('name', p) if isinstance(p, dict) else p for p in patterns]

                  row['analysis_uses_genai'] = 'Yes' if analysis.get('uses_genai') else 'No'
                  row['analysis_genai_intensity'] = analysis.get('genai_intensity', '')
                  row['analysis_models_mentioned'] = '; '.join(analysis.get('models_mentioned', []))
                  row['analysis_build_patterns'] = '; '.join(pattern_names)
                  row['analysis_market_type'] = analysis.get('market_type', '')
                  row['analysis_sub_vertical'] = analysis.get('sub_vertical', '')
                  row['analysis_target_market'] = analysis.get('target_market', '')
                  row['analysis_newsletter_potential'] = analysis.get('newsletter_potential', '')
                  row['analysis_technical_depth'] = analysis.get('technical_depth', '')
                  row['analysis_confidence_score'] = str(analysis.get('confidence_score', ''))
                  row['analysis_competitors'] = ''
                  row['analysis_competitive_moat'] = ''
              else:
                  for col in analysis_cols:
                      row[col] = ''

              enriched_rows.append(row)

          with open(output_path, 'w', encoding='utf-8', newline='') as f:
              writer = csv.DictWriter(f, fieldnames=new_fieldnames)
              writer.writeheader()
              writer.writerows(enriched_rows)

          print(f"TR enriched {matched}/{len(rows)} startups with analysis data")
          EOF

      # ============================================
      # Step 6: Commit regenerated files
      # ============================================
      - name: Commit regenerated data files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          PERIOD="${{ steps.period.outputs.period }}"

          # Source data files (global)
          git add apps/web/data/$PERIOD/output/monthly_stats.json || true
          git add apps/web/data/$PERIOD/output/monthly_brief.json || true
          git add apps/web/data/$PERIOD/output/startups_enriched_with_analysis.csv || true

          # Source data files (TR)
          git add apps/web/data/tr/$PERIOD/output/monthly_stats.json || true
          git add apps/web/data/tr/$PERIOD/output/startups_enriched_with_analysis.csv || true

          # Public directory files (for client-side fetching)
          git add apps/web/public/data/briefs/$PERIOD.json || true
          git add apps/web/public/data/briefings/$PERIOD.json || true

          # Homepage metrics (lib/copy.ts)
          git add apps/web/lib/copy.ts || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Regenerate data artifacts for $PERIOD [skip ci]"
            git push
            echo "Committed regenerated data files"
          fi

      # ============================================
      # Step 7: Sync to Database
      # ============================================
      - name: Apply DB migrations (analysis_data + indexes)
        if: steps.check_csv.outputs.csv_exists == 'true' && github.event.inputs.regenerate_only != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python3 << 'EOF'
          import os
          from pathlib import Path
          import psycopg2

          db_url = os.environ.get('DATABASE_URL', '')
          if not db_url:
              raise SystemExit('Missing DATABASE_URL')

          # Keep this list idempotent (IF NOT EXISTS), so repeated runs are safe.
          # These are required for DB-driven Dealbook filters (including vertical_taxonomy).
          migrations = [
              '008_startup_analysis_data.sql',
              '010_add_constraints.sql',
              '019_startup_vertical_taxonomy_indexes.sql',
              '021_build_patterns_and_funding_indexes.sql',
          ]

          with psycopg2.connect(db_url) as conn:
              with conn.cursor() as cur:
                  for name in migrations:
                      path = Path('database/migrations') / name
                      if not path.exists():
                          print(f'Skipped (not found): {path}')
                          continue
                      sql = path.read_text(encoding='utf-8')
                      cur.execute(sql)
                      print(f'Applied: {path}')
              conn.commit()
          EOF

      - name: Sync to database via API
        if: steps.check_csv.outputs.csv_exists == 'true' && github.event.inputs.regenerate_only != 'true'
        id: sync
        env:
          API_KEY: ${{ secrets.API_KEY }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
        run: |
          python3 << 'EOF'
          import csv
          import json
          import os
          import urllib.request
          import urllib.error

          csv_path = "${{ steps.check_csv.outputs.csv_path }}"
          api_url = os.environ.get('API_URL', '${{ env.API_URL }}')
          api_key = os.environ.get('API_KEY', '')
          admin_key = os.environ.get('ADMIN_KEY', '')

          startups = []
          with open(csv_path, 'r', encoding='utf-8') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  name = row.get('Transaction Name', '')
                  if ' - ' in name:
                      name = name.split(' - ', 1)[1]

                  startup = {
                      'name': name,
                      'description': row.get('Organization Description', ''),
                      'website': row.get('Organization Website', ''),
                      'location': row.get('Organization Location', ''),
                      'industries': row.get('Organization Industries', ''),
                      'roundType': row.get('Funding Type', ''),
                      'amountUsd': row.get('Money Raised (in USD)', ''),
                      'announcedDate': row.get('Announced Date', ''),
                      'fundingStage': row.get('Funding Stage', ''),
                      'leadInvestors': row.get('Lead Investors', ''),
                  }
                  startups.append(startup)

          print(f"Parsed {len(startups)} startups from CSV")

          payload = json.dumps({'startups': startups}).encode('utf-8')

          req = urllib.request.Request(
              f"{api_url}/api/admin/sync-startups",
              data=payload,
              headers={
                  'Content-Type': 'application/json',
                  'X-Admin-Key': admin_key,
                  'X-API-Key': api_key,
              },
              method='POST'
          )

          try:
              with urllib.request.urlopen(req, timeout=120) as response:
                  result = json.loads(response.read().decode('utf-8'))
                  print(f"Sync result: {json.dumps(result, indent=2)}")

                  with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
                      f.write(f"inserted={result.get('results', {}).get('inserted', 0)}\n")
                      f.write(f"updated={result.get('results', {}).get('updated', 0)}\n")
                      f.write(f"failed={len(result.get('results', {}).get('failed', []))}\n")
                      f.write(f"total={result.get('results', {}).get('total', 0)}\n")
          except urllib.error.HTTPError as e:
              print(f"HTTP Error {e.code}: {e.reason}")
              print(e.read().decode('utf-8'))
              raise SystemExit(1)
          except urllib.error.URLError as e:
              print(f"URL Error: {e.reason}")
              raise SystemExit(1)
          EOF

      - name: Populate startups.analysis_data from analysis store (includes vertical_taxonomy)
        if: steps.check_csv.outputs.csv_exists == 'true' && github.event.inputs.regenerate_only != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python3 scripts/populate-analysis-data.py --period "${{ steps.period.outputs.period }}"

      # ============================================
      # Step 7b: Sync TR data to Database
      # ============================================
      - name: Sync TR startups to database via API
        if: steps.check_csv.outputs.tr_csv_exists == 'true' && github.event.inputs.regenerate_only != 'true'
        id: sync_tr
        env:
          API_KEY: ${{ secrets.API_KEY }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
        run: |
          python3 << 'EOF'
          import csv
          import json
          import os
          import urllib.request
          import urllib.error

          csv_path = "${{ steps.check_csv.outputs.tr_csv_path }}"
          api_url = os.environ.get('API_URL', '${{ env.API_URL }}')
          api_key = os.environ.get('API_KEY', '')
          admin_key = os.environ.get('ADMIN_KEY', '')

          startups = []
          with open(csv_path, 'r', encoding='utf-8') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  name = row.get('Transaction Name', '').strip()
                  if not name:
                      continue

                  startup = {
                      'name': name,
                      'description': row.get('Organization Description', ''),
                      'website': row.get('Organization Website', ''),
                      'location': row.get('Organization Location', ''),
                      'industries': row.get('Organization Industries', ''),
                      'roundType': row.get('Funding Type', ''),
                      'amountUsd': row.get('Money Raised (in USD)', ''),
                      'announcedDate': row.get('Announced Date', ''),
                      'fundingStage': row.get('Funding Stage', ''),
                      'leadInvestors': row.get('Lead Investors', ''),
                  }
                  startups.append(startup)

          print(f"Parsed {len(startups)} TR startups from CSV")

          payload = json.dumps({'startups': startups}).encode('utf-8')

          req = urllib.request.Request(
              f"{api_url}/api/admin/sync-startups?region=turkey",
              data=payload,
              headers={
                  'Content-Type': 'application/json',
                  'X-Admin-Key': admin_key,
                  'X-API-Key': api_key,
              },
              method='POST'
          )

          try:
              with urllib.request.urlopen(req, timeout=120) as response:
                  result = json.loads(response.read().decode('utf-8'))
                  print(f"TR sync result: {json.dumps(result, indent=2)}")

                  with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
                      f.write(f"tr_inserted={result.get('results', {}).get('inserted', 0)}\n")
                      f.write(f"tr_updated={result.get('results', {}).get('updated', 0)}\n")
                      f.write(f"tr_total={result.get('results', {}).get('total', 0)}\n")
          except urllib.error.HTTPError as e:
              print(f"TR sync HTTP Error {e.code}: {e.reason}")
              print(e.read().decode('utf-8'))
              raise SystemExit(1)
          except urllib.error.URLError as e:
              print(f"TR sync URL Error: {e.reason}")
              raise SystemExit(1)
          EOF

      - name: Populate TR startups.analysis_data from analysis store
        if: steps.check_csv.outputs.tr_csv_exists == 'true' && github.event.inputs.regenerate_only != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python3 scripts/populate-analysis-data.py --period "${{ steps.period.outputs.period }}" --region turkey

      - name: Summary
        if: always()
        run: |
          echo "## Data Regeneration & Sync Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Period | ${{ steps.period.outputs.period }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CSV Found | ${{ steps.check_csv.outputs.csv_exists }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Regenerate Only | ${{ github.event.inputs.regenerate_only || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Startups in DB | ${{ steps.sync.outputs.total || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DB Inserted | ${{ steps.sync.outputs.inserted || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DB Updated | ${{ steps.sync.outputs.updated || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TR CSV Found | ${{ steps.check_csv.outputs.tr_csv_exists }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TR Startups in DB | ${{ steps.sync_tr.outputs.tr_total || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TR Inserted | ${{ steps.sync_tr.outputs.tr_inserted || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TR Updated | ${{ steps.sync_tr.outputs.tr_updated || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files Regenerated" >> $GITHUB_STEP_SUMMARY
          echo "- \`monthly_stats.json\` - Aggregate statistics with GenAI analysis" >> $GITHUB_STEP_SUMMARY
          echo "- \`monthly_brief.json\` - Intelligence brief for /brief page" >> $GITHUB_STEP_SUMMARY
          echo "- \`startups_enriched_with_analysis.csv\` - CSV with analysis columns" >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack (failure)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "Sync to database failed"
          SLACK_STATUS: "failure"
          SLACK_BODY: |
            *Workflow:* `${{ github.workflow }}`
            *Job:* `regenerate-and-sync`
            *Ref:* `${{ github.ref_name }}`
            *SHA:* `${{ github.sha }}`
          SLACK_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 scripts/slack_notify.py
