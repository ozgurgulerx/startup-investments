name: Deploy Functions

on:
  push:
    branches: [main]
    paths:
      - "infrastructure/azure-functions/**"
  workflow_dispatch:

concurrency:
  group: deploy-functions

permissions:
  id-token: write
  contents: read

env:
  FUNCTIONAPP_NAME: buildatlas-functions
  FUNCTIONS_RG: aistartuptr

jobs:
  deploy:
    name: Build & Deploy Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Azure OIDC Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare deployment package
        run: |
          TEMP_DIR=$(mktemp -d)
          cp -r infrastructure/azure-functions/* "$TEMP_DIR/"
          mkdir -p "$TEMP_DIR/packages_analysis"
          cp -r packages/analysis/* "$TEMP_DIR/packages_analysis/"

          pip install -r "$TEMP_DIR/requirements.txt" \
            --target "$TEMP_DIR/.python_packages/lib/site-packages" \
            --quiet

          find "$TEMP_DIR" -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true

          cd "$TEMP_DIR" && zip -qr /tmp/functions-deploy.zip .
          echo "DEPLOY_ZIP=/tmp/functions-deploy.zip" >> "$GITHUB_ENV"

      - name: Deploy to Azure Functions
        run: |
          az functionapp deployment source config-zip \
            --resource-group "$FUNCTIONS_RG" \
            --name "$FUNCTIONAPP_NAME" \
            --src "$DEPLOY_ZIP" \
            --output none

      - name: Health check
        run: |
          HEALTH_URL="https://$FUNCTIONAPP_NAME.azurewebsites.net/api/health"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$HEALTH_URL" 2>/dev/null || echo '000')
            if [ "$STATUS" = "200" ]; then
              echo "Functions health endpoint OK (HTTP 200)"
              exit 0
            fi
            echo "Waiting for functions app... (attempt $i/30, status=$STATUS)"
            sleep 10
          done
          echo "::error::Functions health check failed"
          exit 1

      - name: Slack — deploy result
        if: always()
        uses: ./.github/actions/slack-notify
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          title: "Functions deploy ${{ job.status }}"
          status: ${{ job.status == 'success' && 'success' || 'failure' }}
          body: "App: `${{ env.FUNCTIONAPP_NAME }}`"
