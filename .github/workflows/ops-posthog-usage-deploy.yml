name: Deploy Ops PostHog Usage CronJob (AKS)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: aistartuptr
  AKS_CLUSTER_NAME: aks-aistartuptr
  AKS_RESOURCE_GROUP: aistartuptr
  IMAGE_NAME: buildatlas-ops
  CRONJOB_NAME: posthog-usage-summary
  NAMESPACE: default

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
        run: |
          for key in SLACK_WEBHOOK_URL POSTHOG_PROJECT_ID POSTHOG_PERSONAL_API_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              exit 1
            fi
          done

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push ops image
        run: |
          docker build -f infrastructure/ops/Dockerfile -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure AKS is running
        shell: bash
        run: |
          state="$(az aks show -g "${{ env.AKS_RESOURCE_GROUP }}" -n "${{ env.AKS_CLUSTER_NAME }}" --query "powerState.code" -o tsv 2>/dev/null || echo "UNKNOWN")"
          echo "AKS power state: $state"

          if [ "$state" = "Stopped" ]; then
            echo "AKS is stopped, starting..."
            az aks start -g "${{ env.AKS_RESOURCE_GROUP }}" -n "${{ env.AKS_CLUSTER_NAME }}"
          fi

          for i in {1..60}; do
            state="$(az aks show -g "${{ env.AKS_RESOURCE_GROUP }}" -n "${{ env.AKS_CLUSTER_NAME }}" --query "powerState.code" -o tsv 2>/dev/null || echo "UNKNOWN")"
            if [ "$state" = "Running" ]; then
              echo "AKS is Running."
              exit 0
            fi
            echo "Waiting for AKS to be Running (attempt=$i, state=$state)..."
            sleep 10
          done

          echo "::error::AKS did not reach Running state (state=$state)"
          exit 1

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Create/Update ops secrets
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
        run: |
          args=(
            "--from-literal=slack-webhook-url=${SLACK_WEBHOOK_URL}"
            "--from-literal=posthog-project-id=${POSTHOG_PROJECT_ID}"
            "--from-literal=posthog-personal-api-key=${POSTHOG_PERSONAL_API_KEY}"
          )
          if [ -n "${POSTHOG_HOST:-}" ]; then
            args+=("--from-literal=posthog-host=${POSTHOG_HOST}")
          fi

          kubectl create secret generic buildatlas-ops-secrets \
            --namespace "${{ env.NAMESPACE }}" \
            "${args[@]}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy CronJob
        run: |
          tag="${{ github.sha }}"
          sed "s/__IMAGE_TAG__/${tag}/g" infrastructure/kubernetes/posthog-usage-cronjob.yaml | kubectl apply -n "${{ env.NAMESPACE }}" -f -

      - name: Run CronJob once (verification)
        run: |
          job="posthog-usage-summary-manual-${{ github.run_id }}"
          kubectl create job -n "${{ env.NAMESPACE }}" --from=cronjob/${{ env.CRONJOB_NAME }} "$job"
          kubectl wait -n "${{ env.NAMESPACE }}" --for=condition=complete "job/$job" --timeout=240s
          kubectl logs -n "${{ env.NAMESPACE }}" "job/$job"
