name: Build and Deploy Backend to AKS

on:
  # VM cron handles backend deploys now (infrastructure/vm-cron/jobs/backend-deploy.sh)
  # This workflow is kept as a manual backup only
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: aistartuptr
  AKS_CLUSTER_NAME: aks-aistartuptr
  AKS_RESOURCE_GROUP: aistartuptr
  IMAGE_NAME: startup-investments-api
  API_URL: ${{ vars.API_URL }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
          FRONT_DOOR_ID: ${{ secrets.FRONT_DOOR_ID }}
        run: |
          for key in DATABASE_URL API_KEY ADMIN_KEY FRONT_DOOR_ID; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              exit 1
            fi
          done

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Check no root dependencies
        run: |
          if grep -qE '"dependencies"\s*:' package.json; then
            echo "::error::Root package.json has 'dependencies' — move them to the appropriate workspace package."
            exit 1
          fi

      - name: Build and push Docker image
        run: |
          docker build -f apps/api/Dockerfile -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Notify Slack (failure)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "Backend build failed"
          SLACK_STATUS: "failure"
          SLACK_BODY: |
            *Workflow:* `${{ github.workflow }}`
            *Job:* `build`
            *Ref:* `${{ github.ref_name }}`
            *SHA:* `${{ github.sha }}`
          SLACK_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 scripts/slack_notify.py

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure AKS is running
        shell: bash
        run: |
          state="$(az aks show -g "${{ env.AKS_RESOURCE_GROUP }}" -n "${{ env.AKS_CLUSTER_NAME }}" --query "powerState.code" -o tsv 2>/dev/null || echo "UNKNOWN")"
          echo "AKS power state: $state"

          if [ "$state" = "Stopped" ]; then
            echo "AKS is stopped, starting..."
            az aks start -g "${{ env.AKS_RESOURCE_GROUP }}" -n "${{ env.AKS_CLUSTER_NAME }}"
          fi

          # Wait for the control plane DNS/API to become reachable (avoids aks-set-context failures).
          for i in {1..60}; do
            state="$(az aks show -g "${{ env.AKS_RESOURCE_GROUP }}" -n "${{ env.AKS_CLUSTER_NAME }}" --query "powerState.code" -o tsv 2>/dev/null || echo "UNKNOWN")"
            if [ "$state" = "Running" ]; then
              echo "AKS is Running."
              exit 0
            fi
            echo "Waiting for AKS to be Running (attempt=$i, state=$state)..."
            sleep 10
          done

          echo "::error::AKS did not reach Running state (state=$state)"
          exit 1

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Create/Update Kubernetes Secret
        run: |
          kubectl create secret generic startup-investments-secrets \
            --from-literal=database-url="${{ secrets.DATABASE_URL }}" \
            --from-literal=api-key="${{ secrets.API_KEY }}" \
            --from-literal=admin-key="${{ secrets.ADMIN_KEY }}" \
            --from-literal=front-door-id="${{ secrets.FRONT_DOOR_ID }}" \
            --from-literal=redis-url="${{ secrets.REDIS_URL }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to AKS
        run: |
          kubectl apply -f infrastructure/kubernetes/api-deployment.yaml
          kubectl rollout status deployment/startup-investments-api --timeout=300s

      - name: Wait for API to be healthy
        run: |
          API_URL="${{ env.API_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="https://startupapi-f7gfbpbtbtfqdmdv.b02.azurefd.net"
          fi
          echo "Waiting for API to be healthy at $API_URL..."
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "API is healthy!"
              break
            fi
            echo "Attempt $i: Status $STATUS, waiting..."
            sleep 10
          done

      - name: Trigger Logo Extraction
        run: |
          API_URL="${{ env.API_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="https://startupapi-f7gfbpbtbtfqdmdv.b02.azurefd.net"
          fi
          echo "Triggering logo extraction..."

          # First check logo status
          echo "Current logo status:"
          curl -s \
            -H "x-api-key: ${{ secrets.API_KEY }}" \
            -H "x-admin-key: ${{ secrets.ADMIN_KEY }}" \
            "$API_URL/api/admin/logo-status" | jq .

      - name: Notify Slack (failure)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "Backend deploy failed"
          SLACK_STATUS: "failure"
          SLACK_BODY: |
            *Workflow:* `${{ github.workflow }}`
            *Job:* `deploy`
            *Ref:* `${{ github.ref_name }}`
            *SHA:* `${{ github.sha }}`
          SLACK_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 scripts/slack_notify.py

          # Trigger extraction (only for startups without logos)
          echo "Starting logo extraction..."
          RESULT=$(curl -s -X POST \
            -H "x-api-key: ${{ secrets.API_KEY }}" \
            -H "x-admin-key: ${{ secrets.ADMIN_KEY }}" \
            "$API_URL/api/admin/extract-logos")
          echo "$RESULT" | jq .

          # Show final status
          echo "Final logo status:"
          curl -s \
            -H "x-api-key: ${{ secrets.API_KEY }}" \
            -H "x-admin-key: ${{ secrets.ADMIN_KEY }}" \
            "$API_URL/api/admin/logo-status" | jq .
