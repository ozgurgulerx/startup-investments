name: Build and Deploy Backend to AKS

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'infrastructure/kubernetes/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: aistartuptr
  AKS_CLUSTER_NAME: aks-aistartuptr
  AKS_RESOURCE_GROUP: aistartuptr
  IMAGE_NAME: startup-investments-api
  API_URL: ${{ vars.API_URL }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
          FRONT_DOOR_ID: ${{ secrets.FRONT_DOOR_ID }}
        run: |
          for key in DATABASE_URL API_KEY ADMIN_KEY FRONT_DOOR_ID; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              exit 1
            fi
          done

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} apps/api
          docker tag ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Create/Update Kubernetes Secret
        run: |
          kubectl create secret generic startup-investments-secrets \
            --from-literal=database-url="${{ secrets.DATABASE_URL }}" \
            --from-literal=api-key="${{ secrets.API_KEY }}" \
            --from-literal=admin-key="${{ secrets.ADMIN_KEY }}" \
            --from-literal=front-door-id="${{ secrets.FRONT_DOOR_ID }}" \
            --from-literal=redis-url="${{ secrets.REDIS_URL }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to AKS
        run: |
          kubectl apply -f infrastructure/kubernetes/api-deployment.yaml
          kubectl rollout status deployment/startup-investments-api --timeout=300s

      - name: Wait for API to be healthy
        run: |
          API_URL="${{ env.API_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="https://startupapi-f7gfbpbtbtfqdmdv.b02.azurefd.net"
          fi
          echo "Waiting for API to be healthy at $API_URL..."
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "API is healthy!"
              break
            fi
            echo "Attempt $i: Status $STATUS, waiting..."
            sleep 10
          done

      - name: Trigger Logo Extraction
        run: |
          API_URL="${{ env.API_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="https://startupapi-f7gfbpbtbtfqdmdv.b02.azurefd.net"
          fi
          echo "Triggering logo extraction..."

          # First check logo status
          echo "Current logo status:"
          curl -s \
            -H "x-api-key: ${{ secrets.API_KEY }}" \
            -H "x-admin-key: ${{ secrets.ADMIN_KEY }}" \
            "$API_URL/api/admin/logo-status" | jq .

          # Trigger extraction (only for startups without logos)
          echo "Starting logo extraction..."
          RESULT=$(curl -s -X POST \
            -H "x-api-key: ${{ secrets.API_KEY }}" \
            -H "x-admin-key: ${{ secrets.ADMIN_KEY }}" \
            "$API_URL/api/admin/extract-logos")
          echo "$RESULT" | jq .

          # Show final status
          echo "Final logo status:"
          curl -s \
            -H "x-api-key: ${{ secrets.API_KEY }}" \
            -H "x-admin-key: ${{ secrets.ADMIN_KEY }}" \
            "$API_URL/api/admin/logo-status" | jq .
