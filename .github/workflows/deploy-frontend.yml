name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/shared/**"
  workflow_dispatch:

concurrency:
  group: deploy-frontend

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: aistartuptr
  WEBAPP_NAME: buildatlas-web
  RESOURCE_GROUP: rg-startup-analysis
  IMAGE_NAME: buildatlas-web

jobs:
  deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure OIDC Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image to ACR
        run: |
          COMMIT_SHA="${GITHUB_SHA::7}"
          az acr build \
            --registry "$ACR_NAME" \
            --image "$IMAGE_NAME:$COMMIT_SHA" \
            --image "$IMAGE_NAME:latest" \
            --file apps/web/Dockerfile \
            --build-arg "NEXT_PUBLIC_BUILD_SHA=$COMMIT_SHA" \
            --build-arg "NEXT_PUBLIC_API_URL=https://startupapi-f7gfbpbtbtfqdmdv.b02.azurefd.net" \
            --build-arg "NEXT_PUBLIC_POSTHOG_HOST=https://us.i.posthog.com" \
            --build-arg "NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.POSTHOG_PROJECT_API_KEY }}" \
            --build-arg "NEXT_PUBLIC_POSTHOG_AUTOCAPTURE=false" \
            --build-arg "NEXT_PUBLIC_POSTHOG_CAPTURE_PAGELEAVE=false" \
            --build-arg "NEXT_PUBLIC_POSTHOG_CAPTURE_DEAD_CLICKS=false" \
            --build-arg "NEXT_PUBLIC_POSTHOG_CAPTURE_EXCEPTIONS=true" \
            --build-arg "NEXT_PUBLIC_POSTHOG_REPLAY_SAMPLE_RATE=0.03" \
            --build-arg "NEXT_PUBLIC_CLARITY_PROJECT_ID=${{ secrets.CLARITY_PROJECT_ID }}" \
            .
          echo "IMAGE_TAG=$COMMIT_SHA" >> "$GITHUB_ENV"

      - name: Update App Service container
        run: |
          FULL_IMAGE="$ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG"
          ACR_USER=$(az acr credential show --name "$ACR_NAME" --query "username" -o tsv)
          ACR_PASS=$(az acr credential show --name "$ACR_NAME" --query "passwords[0].value" -o tsv)

          az webapp config container set \
            --resource-group "$RESOURCE_GROUP" \
            --name "$WEBAPP_NAME" \
            --container-image-name "$FULL_IMAGE" \
            --container-registry-url "https://$ACR_NAME.azurecr.io" \
            --container-registry-user "$ACR_USER" \
            --container-registry-password "$ACR_PASS" \
            --output none

          az webapp config set \
            --resource-group "$RESOURCE_GROUP" \
            --name "$WEBAPP_NAME" \
            --startup-file "node apps/web/server.js" \
            --output none

      - name: Configure App Service settings
        run: |
          az webapp config appsettings set \
            --resource-group "$RESOURCE_GROUP" \
            --name "$WEBAPP_NAME" \
            --settings \
              NODE_ENV=production \
              WEBSITES_PORT=8080 \
              WEBSITES_ENABLE_APP_SERVICE_STORAGE=false \
              NEXTAUTH_URL=https://buildatlas.net \
              PUBLIC_BASE_URL=https://buildatlas.net \
              NEXT_PUBLIC_BUILD_SHA="$IMAGE_TAG" \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              AUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
              NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
              GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
              NEWS_DIGEST_FROM_EMAIL="${{ secrets.NEWS_DIGEST_FROM_EMAIL }}" \
              NEWS_DIGEST_REPLY_TO="${{ secrets.NEWS_DIGEST_REPLY_TO }}" \
              API_KEY="${{ secrets.API_KEY }}" \
              ADMIN_KEY="${{ secrets.ADMIN_KEY }}" \
              NEXT_PUBLIC_POSTHOG_KEY="${{ secrets.POSTHOG_PROJECT_API_KEY }}" \
              NEXT_PUBLIC_POSTHOG_AUTOCAPTURE=false \
              NEXT_PUBLIC_POSTHOG_CAPTURE_PAGELEAVE=false \
              NEXT_PUBLIC_POSTHOG_CAPTURE_DEAD_CLICKS=false \
              NEXT_PUBLIC_POSTHOG_CAPTURE_EXCEPTIONS=true \
              NEXT_PUBLIC_POSTHOG_REPLAY_SAMPLE_RATE=0.03 \
              NEXT_PUBLIC_CLARITY_PROJECT_ID="${{ secrets.CLARITY_PROJECT_ID }}" \
            --output none

      - name: Smoke check — verify build SHA
        run: |
          COMMIT_SHA="${GITHUB_SHA::7}"
          OK=0
          for i in $(seq 1 20); do
            HTML=$(curl -fsS --max-time 10 -H 'Cache-Control: no-cache' "https://buildatlas.net/?v=$COMMIT_SHA" 2>/dev/null || true)
            if echo "$HTML" | grep -q "ba-build-sha\" content=\"$COMMIT_SHA\""; then
              echo "Build marker verified: ba-build-sha=$COMMIT_SHA"
              OK=1
              break
            fi
            echo "Waiting for new build... (attempt $i/20)"
            sleep 3
          done

          if [ "$OK" -ne 1 ]; then
            echo "Build not visible after 60s — restarting App Service..."
            az webapp restart --resource-group "$RESOURCE_GROUP" --name "$WEBAPP_NAME" --output none || true
            sleep 10
            for i in $(seq 1 8); do
              HTML=$(curl -fsS --max-time 10 -H 'Cache-Control: no-cache' "https://buildatlas.net/?v=$COMMIT_SHA-r" 2>/dev/null || true)
              if echo "$HTML" | grep -q "ba-build-sha\" content=\"$COMMIT_SHA\""; then
                echo "Build marker verified after restart: ba-build-sha=$COMMIT_SHA"
                OK=1
                break
              fi
              echo "Post-restart check... (attempt $i/8)"
              sleep 3
            done
          fi

          if [ "$OK" -ne 1 ]; then
            echo "::error::Build marker not visible on buildatlas.net after deploy + restart"
            exit 1
          fi

      - name: Slack — deploy result
        if: always()
        uses: ./.github/actions/slack-notify
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          title: "Frontend deploy ${{ job.status }}"
          status: ${{ job.status == 'success' && 'success' || 'failure' }}
          body: "Image: `${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}`"
