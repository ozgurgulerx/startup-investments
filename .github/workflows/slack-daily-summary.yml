name: Slack Daily Ops Summary
# NOTE: Scheduled runs moved to VM cron (infrastructure/vm-cron/jobs/slack-summary.sh).
# This workflow is kept for manual dispatch only.

on:
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

jobs:
  post-summary:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install analysis dependencies
        working-directory: packages/analysis
        run: |
          pip install -r requirements.txt

      - name: Post Slack summary
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 scripts/slack_daily_summary.py

