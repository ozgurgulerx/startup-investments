name: VM Cron Slack Notify

on:
  repository_dispatch:
    types: [vm-cron-slack-notify]

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Post notification to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys

          event_path = os.environ.get("GITHUB_EVENT_PATH")
          with open(event_path, "r", encoding="utf-8") as f:
              event = json.load(f)

          payload = event.get("client_payload") or {}
          if not isinstance(payload, dict):
              payload = {}

          title = payload.get("title") or "BuildAtlas VM Cron"
          status = payload.get("status") or "info"
          body = payload.get("body") or ""

          gh_run_url = (
              f"{os.environ.get('GITHUB_SERVER_URL', 'https://github.com')}/"
              f"{os.environ.get('GITHUB_REPOSITORY', '')}/actions/runs/"
              f"{os.environ.get('GITHUB_RUN_ID', '')}"
          )

          os.environ["SLACK_TITLE"] = str(title)
          os.environ["SLACK_STATUS"] = str(status)
          os.environ["SLACK_BODY"] = str(body)
          os.environ["SLACK_URL"] = gh_run_url

          ctx = payload.get("context")
          if isinstance(ctx, dict) and ctx:
              os.environ["SLACK_CONTEXT_JSON"] = json.dumps(ctx, ensure_ascii=True)

          subprocess.check_call([sys.executable, "scripts/slack_notify.py"])
          PY

