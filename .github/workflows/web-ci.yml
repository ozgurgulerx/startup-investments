name: Web CI (Signals Smoke)

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  NODE_VERSION: '20.x'
  # Route all server-side API calls to the local mock API server (not prod).
  NEXT_PUBLIC_API_URL: http://127.0.0.1:3001
  API_KEY: test-api-key
  # NextAuth needs these at runtime (even if not used by the smoke tests).
  NEXTAUTH_SECRET: test-nextauth-secret
  GOOGLE_CLIENT_ID: test-google-client-id
  GOOGLE_CLIENT_SECRET: test-google-client-secret
  # Avoid undefined DB config errors in modules that create a pool (not used in these tests).
  DATABASE_URL: postgres://test:test@127.0.0.1:5432/test

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        # Avoid downloading Playwright browsers during install; we'll install Chromium explicitly below.
        run: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 pnpm install --frozen-lockfile

      - name: Type-check (web)
        run: pnpm --filter web type-check

      - name: Build (web)
        run: pnpm --filter web build

      - name: Install Playwright (chromium)
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: E2E smoke (signals)
        run: |
          set -euo pipefail

          cleanup() {
            if [ -n "${WEB_PID:-}" ]; then kill "$WEB_PID" 2>/dev/null || true; fi
            if [ -n "${MOCK_PID:-}" ]; then kill "$MOCK_PID" 2>/dev/null || true; fi
          }
          trap cleanup EXIT

          pnpm --filter web exec tsx e2e/mock-api-server.ts &
          MOCK_PID=$!

          RUN_DIR="apps/web/.next/standalone/apps/web"

          # Standalone output includes server + node_modules, but not static/public/data.
          # Keep node_modules symlinks intact by running in-place (avoid copying to /tmp).
          mkdir -p "$RUN_DIR/.next/static"
          rsync -a apps/web/.next/static/ "$RUN_DIR/.next/static/"
          rsync -a apps/web/public/ "$RUN_DIR/public/"
          rsync -a apps/web/data/ "$RUN_DIR/data/" || true

          PORT=3000 HOSTNAME=127.0.0.1 node "$RUN_DIR/server.js" &
          WEB_PID=$!

          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:3000/signals?region=turkey" >/dev/null; then
              echo "web ready"
              break
            fi
            sleep 1
          done

          pnpm --filter web test:e2e
