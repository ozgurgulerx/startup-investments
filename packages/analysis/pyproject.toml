[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "startup-analysis"
version = "0.1.0"
description = "AI Startup Funding Analysis and Intelligence Generation"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Your Name", email = "your@email.com"}
]
keywords = ["ai", "startups", "analysis", "genai", "funding"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "crawl4ai>=0.4.0",
    "scrapy>=2.14.0",
    "scrapy-playwright>=0.0.43",
    "trafilatura>=1.9.0",
    "PyMuPDF>=1.24.0",
    "openai>=1.0.0",
    "azure-identity>=1.15.0",
    "pydantic>=2.0",
    "pandas>=2.0.0",
    "aiohttp>=3.9.0",
    "aiofiles>=23.0.0",
    "typer>=0.9.0",
    "rich>=13.0.0",
    "jinja2>=3.1.0",
    "tenacity>=8.2.0",
    "httpx>=0.25.0",
    "beautifulsoup4>=4.12.0",
    "feedparser>=6.0.11",
    "python-dotenv>=1.0.0",
    "asyncpg>=0.29.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21.0",
    "black>=23.0",
    "ruff>=0.1.0",
    "mypy>=1.0",
]

[project.scripts]
analyze = "main:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]

[tool.ruff]
line-length = 100
select = ["E", "F", "I", "N", "W"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_ignores = true
