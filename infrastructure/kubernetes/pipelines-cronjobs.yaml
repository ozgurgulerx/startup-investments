# NOTE: Deploy tooling replaces `__IMAGE_TAG__` with a concrete image tag (typically a git SHA).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: news-ingest
  namespace: default
  labels:
    app: buildatlas-pipelines
    job: news-ingest
spec:
  schedule: "15 * * * *"
  startingDeadlineSeconds: 7200
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 86400
      activeDeadlineSeconds: 1920
      template:
        metadata:
          labels:
            app: buildatlas-pipelines
            job: news-ingest
        spec:
          restartPolicy: Never
          containers:
            - name: job
              image: aistartuptr.azurecr.io/buildatlas-pipelines:__IMAGE_TAG__
              imagePullPolicy: IfNotPresent
              command:
                - /opt/buildatlas/startup-analysis/infrastructure/vm-cron/lib/runner.sh
              args:
                - news-ingest
                - "30"
                - /opt/buildatlas/startup-analysis/infrastructure/vm-cron/jobs/news-ingest.sh
              envFrom:
                - configMapRef:
                    name: buildatlas-pipelines-config
                - secretRef:
                    name: buildatlas-pipelines-secrets
              resources:
                requests:
                  cpu: "500m"
                  memory: "1Gi"
                limits:
                  cpu: "2"
                  memory: "4Gi"

