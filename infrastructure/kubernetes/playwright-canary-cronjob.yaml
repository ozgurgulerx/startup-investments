apiVersion: batch/v1
kind: CronJob
metadata:
  name: browser-canary-landscapes
  namespace: default
  labels:
    app: buildatlas-ops
spec:
  schedule: "*/15 * * * *" # UTC
  startingDeadlineSeconds: 21600
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400 # 24h
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: buildatlas-ops
        spec:
          restartPolicy: Never
          containers:
            - name: browser-canary
              # Patched by deploy tooling (do not apply this file without replacing __IMAGE_TAG__).
              image: aistartuptr.azurecr.io/buildatlas-playwright-canary:__IMAGE_TAG__
              imagePullPolicy: IfNotPresent
              env:
                - name: SLACK_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: buildatlas-ops-secrets
                      key: slack-webhook-url
                - name: BASE_URL
                  value: "https://buildatlas.net"
                - name: LANDSCAPES_PATH
                  value: "/landscapes"
                - name: TIMEOUT_MS
                  value: "45000"
                - name: DETAIL_TIMEOUT_MS
                  value: "25000"
              resources:
                requests:
                  cpu: "200m"
                  memory: "512Mi"
                limits:
                  cpu: "1000m"
                  memory: "1Gi"

