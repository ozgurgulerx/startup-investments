---
# Pipelines secrets for AKS CronJobs that run the analysis/automation CLI.
apiVersion: v1
kind: Secret
metadata:
  name: buildatlas-pipelines-secrets
type: Opaque
stringData:
  # Use ENV_VAR style keys so CronJobs can use envFrom.secretRef without per-key mapping.
  DATABASE_URL: "postgresql://user:password@host:5432/dbname?sslmode=require"
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/..."
  API_URL: "https://startupapi-f7gfbpbtbtfqdmdv.b02.azurefd.net"
  API_KEY: "replace-with-api-key"
  ADMIN_KEY: "replace-with-admin-key"
  RESEND_API_KEY: "re_..."
  NEWS_DIGEST_FROM_EMAIL: "Build Atlas <news@buildatlas.net>"
  NEWS_DIGEST_REPLY_TO: ""
  PUBLIC_BASE_URL: "https://buildatlas.net"
  AZURE_OPENAI_ENDPOINT: "https://aoai-ep-swedencentral02.openai.azure.com/"
  AZURE_OPENAI_API_KEY: "replace-with-azure-openai-api-key"
  AZURE_OPENAI_DEPLOYMENT_NAME: "gpt-5-nano"
  AZURE_OPENAI_EMBEDDING_DEPLOYMENT: "text-embedding-3-small"
  OPENAI_API_KEY: "replace-with-openai-api-key"
  AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=https;AccountName=...;"
  # Optional: X/Twitter credentials (jobs will skip if absent)
  X_API_BEARER_TOKEN: ""
  X_API_KEY: ""
  X_API_SECRET: ""
  X_ACCESS_TOKEN: ""
  X_ACCESS_TOKEN_SECRET: ""
