apiVersion: apps/v1
kind: Deployment
metadata:
  name: startup-investments-api
  labels:
    app: startup-investments-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: startup-investments-api
  template:
    metadata:
      labels:
        app: startup-investments-api
    spec:
      containers:
        - name: api
          image: aistartuptr.azurecr.io/startup-investments-api:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: startup-investments-secrets
                  key: database-url
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: startup-investments-secrets
                  key: api-key
            - name: FRONT_DOOR_ID
              valueFrom:
                secretKeyRef:
                  name: startup-investments-secrets
                  key: front-door-id
                  optional: true
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: startup-investments-secrets
                  key: redis-url
                  optional: true
            - name: FRONTEND_URL
              value: "https://buildatlas.net"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: startup-investments-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: startup-investments-api
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max
---
apiVersion: v1
kind: Service
metadata:
  name: startup-investments-api
  annotations:
    # Use static public IP created by Bicep template
    # Replace with actual IP from: az network public-ip show -g <rg> -n pip-aks-startupinv-prod --query ipAddress
    service.beta.kubernetes.io/azure-load-balancer-resource-group: "aistartuptr"
    # Uncomment and set after deploying Bicep:
    # service.beta.kubernetes.io/azure-load-balancer-ipv4: "<PUBLIC_IP_FROM_BICEP>"
spec:
  selector:
    app: startup-investments-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001
  type: LoadBalancer
