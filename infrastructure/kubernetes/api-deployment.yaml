apiVersion: apps/v1
kind: Deployment
metadata:
  name: startup-investments-api
  labels:
    app: startup-investments-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: startup-investments-api
  template:
    metadata:
      labels:
        app: startup-investments-api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          # Patched by deploy tooling (do not apply this file without replacing __IMAGE_TAG__).
          image: aistartuptr.azurecr.io/startup-investments-api:__IMAGE_TAG__
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: startup-investments-secrets
                  key: database-url
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: startup-investments-secrets
                  key: api-key
            - name: FRONT_DOOR_ID
              valueFrom:
                secretKeyRef:
                  name: startup-investments-secrets
                  key: front-door-id
            - name: ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: startup-investments-secrets
                  key: admin-key
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: startup-investments-secrets
                  key: redis-url
                  optional: true
            - name: FRONTEND_URL
              value: "https://buildatlas.net"
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: startup-investments-secrets
                  key: applicationinsights-connection-string
                  optional: true
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: startup-investments-secrets
                  key: azure-openai-endpoint
                  optional: true
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: startup-investments-secrets
                  key: azure-openai-api-key
                  optional: true
            - name: AZURE_OPENAI_EMBEDDING_DEPLOYMENT
              valueFrom:
                secretKeyRef:
                  name: startup-investments-secrets
                  key: azure-openai-embedding-deployment
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: startup-investments-secrets
                  key: openai-api-key
                  optional: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
          startupProbe:
            httpGet:
              path: /healthz
              port: 3001
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: startup-investments-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: startup-investments-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max
---
apiVersion: v1
kind: Service
metadata:
  name: startup-investments-api
  # AKS manages the public IP in its managed resource group (mc_...)
  # Do NOT set azure-load-balancer-resource-group — it causes cross-RG reconciliation failures
  annotations: {}
spec:
  selector:
    app: startup-investments-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001
  type: LoadBalancer
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: startup-investments-api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: startup-investments-api
