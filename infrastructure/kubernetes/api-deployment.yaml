apiVersion: apps/v1
kind: Deployment
metadata:
  name: startup-investments-api
  labels:
    app: startup-investments-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: startup-investments-api
  template:
    metadata:
      labels:
        app: startup-investments-api
    spec:
      containers:
        - name: api
          image: ${ACR_NAME}.azurecr.io/startup-investments-api:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: startup-investments-secrets
                  key: database-url
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: startup-investments-api
spec:
  selector:
    app: startup-investments-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: startup-investments-api-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.startup-investments.example.com
      secretName: startup-investments-api-tls
  rules:
    - host: api.startup-investments.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: startup-investments-api
                port:
                  number: 80
